<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LifeReport - AI Copilot</title>
  <style>
    /* =========================================================================
       1. 基本スタイル & テーマ定義 (Cyber Dark)
       ========================================================================= */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }
    body {
      background-color: #03080c;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* スマホ画面風のメインフレーム */
    .phone-frame {
      width: 100%;
      max-width: 480px;
      height: 100vh;
      background: #060d13;
      border-left: 1px solid #102a3a;
      border-right: 1px solid #102a3a;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* =========================================================================
       2. ヘッダー
       ========================================================================= */
    .header {
      background: linear-gradient(180deg, #091824 0%, #060d13 100%);
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1a3a4a;
    }
    .header-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
      cursor: pointer; /* タップで履歴を開けるように */
    }
    .header-title {
      font-size: 16px;
      font-weight: bold;
      color: #00f3ff;
      text-shadow: 0 0 8px rgba(0, 243, 255, 0.4);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 280px;
    }
    .header-status {
      font-size: 11px;
      color: #a0aec0;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .settings-btn {
      background: none;
      border: none;
      color: #00f3ff;
      font-size: 22px;
      cursor: pointer;
      opacity: 0.8;
      transition: opacity 0.2s, transform 0.2s;
    }
    .settings-btn:hover {
      opacity: 1;
      transform: rotate(30deg);
    }

    /* =========================================================================
       3. 【新設】ドロップダウン・コントロールエリア
       ========================================================================= */
    .control-container {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      background: #04090d;
      border-bottom: 1px solid #122530;
    }
    .cyber-select-wrapper {
      flex: 1;
      position: relative;
    }
    .cyber-select {
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      background: #0a141d;
      font-size: 13px;
      font-weight: bold;
      padding: 8px 32px 8px 12px;
      border-radius: 6px;
      outline: none;
      cursor: pointer;
      font-family: monospace;
    }
    /* レポート切り替え用（ネオンブルー） */
    #reportTabSelect {
      color: #00f3ff;
      border: 1px solid rgba(0, 243, 255, 0.3);
      box-shadow: inset 0 0 6px rgba(0, 243, 255, 0.1);
    }
    #reportTabSelect:focus {
      border-color: #00f3ff;
      box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
    }
    /* AIモデル切り替え用（パープル） */
    #aiModelSelect {
      color: #b624ff;
      border: 1px solid rgba(182, 36, 255, 0.3);
      box-shadow: inset 0 0 6px rgba(182, 36, 255, 0.1);
    }
    #aiModelSelect:focus {
      border-color: #b624ff;
      box-shadow: 0 0 10px rgba(182, 36, 255, 0.3);
    }
    /* カスタム矢印 */
    .cyber-select-wrapper::after {
      content: '▼';
      font-size: 9px;
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
    }
    .report-select-wrapper::after { color: #00f3ff; }
    .ai-select-wrapper::after { color: #b624ff; }

    /* =========================================================================
       4. レポートコンテンツ表示領域
       ========================================================================= */
    .report-section {
      --default-height: 25%; /* JSから可変 */
      height: var(--default-height);
      background: #050b10;
      display: flex;
      flex-direction: column;
      transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    .report-section.expanded {
      height: 70% !important; /* 展開時 */
    }
    .report-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }
    /* 各種ペインの隠蔽・表示 */
    .report-pane {
      display: none;
      font-size: 13px;
      line-height: 1.6;
      color: #cbd5e1;
    }
    .report-pane.active {
      display: block;
    }
    /* レポート内HTMLのタイポグラフィ */
    .report-pane h4 {
      color: #00f3ff;
      font-size: 14px;
      margin-top: 10px;
      margin-bottom: 6px;
      border-left: 3px solid #00f3ff;
      padding-left: 6px;
    }
    .report-pane h4:first-child { margin-top: 0; }
    .report-pane p { margin-bottom: 8px; }
    .report-pane ul { margin-left: 16px; margin-bottom: 10px; }
    .report-pane li { margin-bottom: 4px; }

    /* 高度展開用トリガーバー */
    .expand-bar {
      background: #091824;
      color: #4a7a96;
      font-size: 10px;
      font-weight: bold;
      text-align: center;
      padding: 4px 0;
      cursor: pointer;
      border-top: 1px solid #122a3a;
      border-bottom: 1px solid #122a3a;
      user-select: none;
      letter-spacing: 1px;
    }
    .expand-bar:hover { color: #00f3ff; background: #0c2030; }

    /* =========================================================================
       5. チャットログ・対話タイムライン
       ========================================================================= */
    .chat-timeline {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #060d13;
    }
    .msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .msg.user {
      align-self: flex-end;
      background: #005266;
      color: #e6f9ff;
      border-bottom-right-radius: 2px;
      border: 1px solid rgba(0, 243, 255, 0.2);
    }
    .msg.ai {
      align-self: flex-start;
      background: #111c24;
      color: #cbd5e1;
      border-bottom-left-radius: 2px;
      border: 1px solid #1f3545;
    }
    
    /* ローディングスピナー */
    .msg.analyzing {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #8ab4f8;
    }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(138, 180, 248, 0.2);
      border-top-color: #8ab4f8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* =========================================================================
       6. 送信フォーム・インプットデッキ
       ========================================================================= */
    .input-deck {
      background: #091824;
      padding: 10px 12px;
      border-top: 1px solid #1a3a4a;
    }
    
    /* メディアプレビュー */
    .preview-container {
      display: none;
      background: #0c2333;
      padding: 6px 10px;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 12px;
      color: #00f3ff;
      align-items: center;
      justify-content: space-between;
      border: 1px dashed rgba(0, 243, 255, 0.4);
    }
    .preview-container.active { display: flex; }
    .clear-preview { cursor: pointer; color: #ff4a4a; font-weight: bold; }

    .form-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .deck-btn {
      background: #112536;
      border: 1px solid #20445e;
      color: #8ab4f8;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      font-size: 18px;
      transition: background 0.2s;
    }
    .deck-btn:hover { background: #1c3d59; color: #00f3ff; }
    
    .chat-textarea {
      flex: 1;
      background: #050b10;
      border: 1px solid #1a3a4a;
      border-radius: 20px;
      color: #f2f5f8;
      padding: 10px 16px;
      font-size: 14px;
      resize: none;
      height: 40px;
      max-height: 120px;
      outline: none;
      line-height: 1.4;
    }
    .chat-textarea:focus { border-color: #00f3ff; }

    .send-btn {
      background: #00f3ff;
      color: #03080c;
      border: none;
      padding: 0 18px;
      height: 40px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 243, 255, 0.4);
    }
    .send-btn:hover { background: #66f7ff; }

    /* =========================================================================
       7. ボトムシート（履歴・セッション一覧）
       ========================================================================= */
    .sheet-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
      z-index: 90;
    }
    .sheet-overlay.open { opacity: 1; pointer-events: auto; }

    .bottom-sheet {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      background: #07121a;
      border-top: 2px solid #00f3ff;
      border-top-left-radius: 16px;
      border-top-right-radius: 16px;
      max-height: 75%;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 100;
      display: flex;
      flex-direction: column;
      box-shadow: 0 -4px 20px rgba(0, 243, 255, 0.2);
    }
    .bottom-sheet.open { transform: translateY(0); }

    .sheet-header {
      padding: 14px 16px;
      border-bottom: 1px solid #162e3d;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sheet-title { color: #00f3ff; font-weight: bold; font-size: 15px; }
    .new-proj-btn {
      background: linear-gradient(90deg, #b624ff 0%, #00f3ff 100%);
      color: #fff; border: none; padding: 6px 12px; border-radius: 6px;
      font-size: 12px; font-weight: bold; cursor: pointer;
    }

    .sheet-body { flex: 1; overflow-y: auto; padding: 8px 0 24px; }
    .sheet-item {
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      border-bottom: 1px solid #0a1924;
    }
    .sheet-item:hover { background: #0c202e; }
    .sheet-item.active { background: rgba(0, 243, 255, 0.08); }
    .sheet-item.active .sheet-item-name { color: #00f3ff; font-weight: bold; }
    .sheet-item-name { font-size: 13px; color: #cbd5e1; flex: 1; }
    .project-del-btn { color: #718096; padding: 4px; font-size: 14px; }
    .project-del-btn:hover { color: #ff4a4a; }

    /* =========================================================================
       8. モーダルダイアログ (環境設定)
       ========================================================================= */
    .modal-mask {
      position: fixed;
      top:0; left:0; width:100vw; height:100vh;
      background: rgba(2, 5, 8, 0.85);
      backdrop-filter: blur(4px);
      display: flex; justify-content: center; align-items: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
      z-index: 1000;
    }
    .modal-mask.open { opacity: 1; pointer-events: auto; }
    
    .modal-window {
      background: #091824;
      width: 90%; max-width: 400px;
      border: 1px solid #1a445e; border-radius: 12px;
      box-shadow: 0 0 25px rgba(0,243,255,0.15);
      display: flex; flex-direction: column; max-height: 85vh;
    }
    .modal-head { padding: 14px 16px; border-bottom: 1px solid #16374d; color: #00f3ff; font-weight: bold; }
    .modal-body { padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
    
    .setting-group { display: flex; flex-direction: column; gap: 6px; }
    .setting-label { font-size: 12px; color: #8ab4f8; font-weight: bold; }
    
    .cyber-input {
      background: #040d14; border: 1px solid #16374d; border-radius: 6px;
      color: #fff; padding: 8px 12px; font-size: 13px; outline: none; width: 100%;
    }
    .cyber-input:focus { border-color: #00f3ff; }
    
    .radio-pack { display: flex; gap: 10px; }
    .radio-label {
      flex: 1; background: #040d14; border: 1px solid #16374d; border-radius: 6px;
      padding: 8px; text-align: center; font-size: 12px; cursor: pointer; color: #a0aec0;
    }
    .radio-pack input[type="radio"] { display: none; }
    .radio-pack input[type="radio"]:checked + .radio-label {
      background: rgba(0, 243, 255, 0.1); border-color: #00f3ff; color: #00f3ff; font-weight: bold;
    }
    
    .modal-foot {
      padding: 12px 16px; border-top: 1px solid #16374d;
      display: flex; justify-content: flex-end; gap: 10px;
    }
    .btn-secondary { background: #162e3d; border: none; color: #a0aec0; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .btn-primary { background: #00f3ff; border: none; color: #03080c; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; }
  </style>
</head>
<body>

  <div class="phone-frame">
    <!-- ヘッダーエリア -->
    <header class="header">
      <div class="header-left" onclick="toggleBottomSheet()">
        <h1 class="header-title" id="headerTitle">ロード中...</h1>
        <div class="header-status">🔒 ローカルに安全に保存中</div>
      </div>
      <button class="settings-btn" type="button" onclick="openSettings()">⚙️</button>
    </header>

    <!-- 【新設】ツインドロップダウンデッキ -->
    <div class="control-container">
      <!-- 表示タブ切り替え用 -->
      <div class="cyber-select-wrapper report-select-wrapper">
        <select id="reportTabSelect" class="cyber-select">
          <option value="current">Current</option>
          <option value="knowledge">Knowledge</option>
          <option value="memory">Memory 🧠</option>
          <option value="history">History</option>
        </select>
      </div>
      <!-- AIコアモデル切り替え用 -->
      <div class="cyber-select-wrapper ai-select-wrapper">
        <select id="aiModelSelect" class="cyber-select">
          <option value="gemini">🤖 Gemini</option>
          <option value="claude">🤖 Claude</option>
          <option value="deepseek">🤖 DeepSeek</option>
          <option value="openai">🤖 OpenAI</option>
        </select>
      </div>
    </div>

    <!-- 多層構造レポート表示区画 -->
    <section class="report-section" id="reportSection">
      <div class="report-content">
        <div class="report-pane active" id="pane-current"></div>
        <div class="report-pane" id="pane-knowledge"></div>
        <div class="report-pane" id="pane-memory"></div>
        <div class="report-pane" id="pane-history"></div>
      </div>
      <!-- レポート領域をグイッと引き伸ばす展開バー -->
      <div class="expand-bar" id="expandBar" onclick="toggleReportHeight()">▼ レポート領域を展開 ▼</div>
    </section>

    <!-- チャット対話タイムライン -->
    <main class="chat-timeline" id="chatHistory"></main>

    <!-- チャット入力コントロールデッキ -->
    <footer class="input-deck">
      <div class="preview-container" id="previewContainer">
        <span id="previewText">📸 添付画像情報</span>
        <span class="clear-preview" onclick="clearAttachment()">✕</span>
      </div>
      <div class="form-row">
        <!-- ファイル添付（隠しinputをラップ） -->
        <label class="deck-btn">
          📎
          <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleFileSelect(this)">
        </label>
        <!-- 入力エリア -->
        <textarea class="chat-textarea" id="chatInput" placeholder="メッセージを入力... (Ctrl+Enterで送信)"></textarea>
        <!-- 送信ボタン -->
        <button class="send-btn" type="button" onclick="sendMessage()">送信</button>
      </div>
    </footer>

    <!-- ボトムシート（履歴リスト）とオーバーレイ -->
    <div class="sheet-overlay" id="sheetOverlay" onclick="toggleBottomSheet()"></div>
    <div class="bottom-sheet" id="bottomSheet">
      <div class="sheet-header">
        <span class="sheet-title">過去のセッション履歴</span>
        <button class="new-proj-btn" type="button" onclick="triggerNewProject()">＋ 新規生成</button>
      </div>
      <div class="sheet-body">
        <ul id="projectList" style="list-style: none;"></ul>
      </div>
    </div>
  </div>

  <!-- 環境設定モーダル（マスク） -->
  <div class="modal-mask" id="settingsModal">
    <div class="modal-window">
      <div class="modal-head">🔧 システム環境設定</div>
      <div class="modal-body">
        
        <!-- 基底AIモデル設定 (裏同期用) -->
        <div class="setting-group" style="display: none;">
          <span class="setting-label">デフォルトAIモデル</span>
          <div class="radio-pack">
            <input type="radio" name="chatAi" id="aiGemini" value="gemini" checked>
            <label for="aiGemini" class="radio-label">Gemini</label>
            <input type="radio" name="chatAi" id="aiClaude" value="claude">
            <label for="aiClaude" class="radio-label">Claude</label>
            <input type="radio" name="chatAi" id="aiDeepSeek" value="deepseek">
            <label for="aiDeepSeek" class="radio-label">DeepSeek</label>
            <input type="radio" name="chatAi" id="aiOpenAI" value="openai">
            <label for="aiOpenAI" class="radio-label">OpenAI</label>
          </div>
        </div>

        <!-- 初期ビューの高さ設定 -->
        <div class="setting-group">
          <span class="setting-label">レポート領域の初期高度</span>
          <div class="radio-pack">
            <input type="radio" name="repSize" id="sizeMin" value="15">
            <label for="sizeMin" class="radio-label">Low (15%)</label>
            <input type="radio" name="repSize" id="sizeMid" value="25" checked>
            <label for="sizeMid" class="radio-label">Mid (25%)</label>
            <input type="radio" name="repSize" id="sizeMax" value="40">
            <label for="sizeMax" class="radio-label">High (40%)</label>
          </div>
        </div>

        <!-- 各種独立クラウドAPIキーエントリー -->
        <div class="setting-group">
          <span class="setting-label">Gemini API Key</span>
          <input type="password" id="apiKeyGemini" class="cyber-input" placeholder="AI-Keyを入力...">
        </div>
        <div class="setting-group">
          <span class="setting-label">Anthropic Claude API Key</span>
          <input type="password" id="apiKeyClaude" class="cyber-input" placeholder="sk-ant-を入力...">
        </div>
        <div class="setting-group">
          <span class="setting-label">DeepSeek API Key</span>
          <input type="password" id="apiKeyDeepSeek" class="cyber-input" placeholder="sk-を入力...">
        </div>
        <div class="setting-group">
          <span class="setting-label">OpenAI API Key</span>
          <input type="password" id="apiKeyOpenAI" class="cyber-input" placeholder="sk-proj-を入力...">
        </div>

        <!-- 1層目: 共通個人メモリ -->
        <div class="setting-group">
          <span class="setting-label">個人メモリ 🧠 (全プロジェクト共通の前提・プロファイル)</span>
          <textarea id="personalMemory" class="cyber-input" style="height: 100px; resize: vertical; line-height: 1.4;"></textarea>
        </div>

        <!-- インポート／エクスポートコンソール -->
        <div class="setting-group" style="margin-top: 10px; border-top: 1px solid #16374d; padding-top: 14px; gap: 8px;">
          <span class="setting-label">データバックアップマネジメント</span>
          <button type="button" class="btn-secondary" style="background:#1a2733; color:#00f3ff;" onclick="exportAllData()">📤 ローカルへJSONエクスポート</button>
          <label class="btn-secondary" style="background:#241d33; color:#b624ff; text-align:center; display:block; cursor:pointer;">
            📥 バックアップJSONをインポート
            <input type="file" accept=".json" style="display:none;" onchange="importAllData(this)">
          </label>
        </div>

      </div>
      <div class="modal-foot">
        <button type="button" class="btn-secondary" onclick="closeSettings()">キャンセル</button>
        <button type="button" class="btn-primary" onclick="applyAndCloseSettings()">設定を適用</button>
      </div>
    </div>
  </div>

  <!-- ロジックスクリプト接続 -->
  <script src="app.js"></script>
</body>
</html>
