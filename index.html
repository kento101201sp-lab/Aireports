<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LifeReport - AI Copilot</title>
  <style>
    /* =========================================================================
       1. トリプルテーマ定義 & フォントファミリーの最適化
       ========================================================================= */
    :root {
      /* デフォルト：2. Modern Tech */
      --bg-body: #0f172a;
      --bg-frame: #1e293b;
      --bg-deck: #334155;
      --bg-pane: #1e293b;
      --bg-input: #0f172a;
      --text-main: #f8fafc;
      --accent-cyan: #38bdf8;
      --accent-purple: #818cf8;
      --border-color: #475569;
      --msg-user-bg: #2563eb;
      --msg-user-text: #ffffff;
      --msg-ai-bg: #1e293b;
      --msg-ai-border: #475569;
      --select-bg: #334155;
      /* チャットとして洗練された王道のプレーンサンセリフ */
      --font-app: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
    }

    /* テーマ1：Developer Cyber (開発者向けクール・エレクトリック) */
    body.theme-cyber {
      --bg-body: #0a0b10;
      --bg-frame: #12141d;
      --bg-deck: #1a1d29;
      --bg-pane: #151822;
      --bg-input: #1e2231;
      --text-main: #f0f3f6;
      --accent-cyan: #00f5ff;
      --accent-purple: #bd00ff;
      --border-color: #2a2f44;
      --msg-user-bg: linear-gradient(135deg, #bd00ff, #00f5ff);
      --msg-user-text: #ffffff;
      --msg-ai-bg: #151822;
      --msg-ai-border: #00f5ff;
      --select-bg: #1a1d29;
      /* 近未来感・コード感を演出する美しい等幅（モノスペース）フォント */
      --font-app: "SF Mono", SFMono-Regular, Consolas, "Liberation Mono", Menlo, Courier, monospace;
    }

    /* テーマ2：Modern Tech */
    body.theme-tech {
      --bg-body: #0f172a;
      --bg-frame: #1e293b;
      --bg-deck: #334155;
      --bg-pane: #1e293b;
      --bg-input: #0f172a;
      --text-main: #f8fafc;
      --accent-cyan: #38bdf8;
      --accent-purple: #818cf8;
      --border-color: #475569;
      --msg-user-bg: #2563eb;
      --msg-user-text: #ffffff;
      --msg-ai-bg: #1e293b;
      --msg-ai-border: #475569;
      --select-bg: #334155;
      --font-app: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
    }

    /* テーマ3：Soft Clean (淡色ナチュラル) */
    body.theme-soft {
      --bg-body: #f5f3f0;
      --bg-frame: #ffffff;
      --bg-deck: #eae6e1;
      --bg-pane: #faf9f7;
      --bg-input: #f0ede9;
      --text-main: #332f2c;
      --accent-cyan: #6b9080;
      --accent-purple: #b5838d;
      --border-color: #d6cfc7;
      --msg-user-bg: #ffb5a7;
      --msg-user-text: #332f2c;
      --msg-ai-bg: #faf9f7;
      --msg-ai-border: #d6cfc7;
      --select-bg: #f0ede9;
      /* 丸みがあり、目に優しくリラックスして読めるフォント */
      --font-app: "Hiragino Maru Gothic ProN", "Kosugi Maru", "Yu Gothic", sans-serif;
    }

    /* =========================================================================
       2. 基本構造 & レイアウト
       ========================================================================= */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: var(--font-app);
    }
    body {
      background-color: var(--bg-body);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100dvh;
      overflow: hidden;
      transition: background-color 0.2s, color 0.2s;
    }

    .phone-frame {
      width: 100%;
      max-width: 480px;
      height: 100dvh;
      background: var(--bg-frame);
      border-left: 1px solid var(--border-color);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      transition: background 0.2s, border-color 0.2s;
    }

    /* ヘッダー */
    .header {
      background: var(--bg-deck);
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      flex: 1;
      min-width: 0;
    }
    .header-text-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .header-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }
    .header-status {
      font-size: 11px;
      color: var(--accent-cyan);
      opacity: 0.9;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .header-right-actions {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .top-action-btn {
      background: none;
      border: none;
      color: var(--text-main);
      font-size: 20px;
      cursor: pointer;
      opacity: 0.75;
      transition: opacity 0.2s, transform 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .top-action-btn:hover {
      opacity: 1;
      transform: scale(1.1);
    }
    .settings-btn:hover {
      transform: rotate(30deg);
    }

    /* コントロールコンテナ */
    .control-container {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-pane);
      border-bottom: 1px solid var(--border-color);
    }
    .cyber-select-wrapper {
      flex: 1;
      position: relative;
    }
    .cyber-select {
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      background: var(--select-bg);
      color: var(--text-main);
      font-size: 13px;
      font-weight: 500;
      padding: 8px 32px 8px 12px;
      border-radius: 8px;
      outline: none;
      cursor: pointer;
      border: 1px solid var(--border-color);
      transition: all 0.2s;
    }
    .cyber-select-wrapper::after {
      content: '▼';
      font-size: 8px;
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      opacity: 0.6;
    }

    /* レポート領域 */
    .report-section {
      --default-height: 25%;
      height: var(--default-height);
      background: var(--bg-pane);
      display: flex;
      flex-direction: column;
      transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    .report-section.expanded { height: 70% !important; }
    .report-content { flex: 1; overflow-y: auto; padding: 14px 16px; user-select: text; }
    .report-pane { display: none; font-size: 13px; line-height: 1.6; }
    .report-pane.active { display: block; }
    .report-pane h4 {
      color: var(--accent-purple); font-size: 14px; margin-top: 14px; margin-bottom: 6px;
      border-left: 3px solid var(--accent-purple); padding-left: 8px; font-weight: 600;
    }
    .report-pane h4:first-child { margin-top: 0; }
    .report-pane p { margin-bottom: 8px; color: var(--text-main); opacity: 0.9; }
    .report-pane ul { margin-left: 16px; margin-bottom: 10px; }
    .report-pane li { margin-bottom: 4px; opacity: 0.9; }

    .expand-bar {
      background: var(--bg-deck); color: var(--text-main); opacity: 0.7;
      font-size: 11px; font-weight: 500; text-align: center; padding: 8px 0;
      cursor: pointer; border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color);
      user-select: none; letter-spacing: 1px; transition: opacity 0.2s, color 0.2s;
    }
    .expand-bar:hover { opacity: 1; color: var(--accent-cyan); }

    /* チャットタイムライン */
    .chat-timeline {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: var(--bg-frame);
    }
    .msg {
      max-width: 85%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; word-break: break-word; white-space: pre-wrap; user-select: text;
    }
    .msg.user {
      align-self: flex-end; background: var(--msg-user-bg); color: var(--msg-user-text); border-bottom-right-radius: 2px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .msg.ai {
      align-self: flex-start; background: var(--msg-ai-bg); color: var(--text-main); border-bottom-left-radius: 2px; border: 1px solid var(--msg-ai-border);
    }
    .msg.ai strong { color: var(--accent-cyan); font-weight: 600; }
    
    .msg.analyzing { display: flex; align-items: center; gap: 10px; color: var(--accent-cyan); background: rgba(82, 201, 240, 0.05); border: 1px dashed var(--accent-cyan); }
    .spinner { width: 16px; height: 16px; border: 2px solid var(--border-color); border-top-color: var(--accent-cyan); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 入力デッキ (カプセル化・内包型に再ビルド) */
    .input-deck {
      background: var(--bg-deck); padding: 12px; border-top: 1px solid var(--border-color); z-index: 10;
    }
    .preview-container {
      display: none; background: var(--bg-pane); padding: 6px 10px; border-radius: 6px; margin-bottom: 8px;
      font-size: 12px; color: var(--accent-cyan); align-items: center; justify-content: space-between; border: 1px dashed var(--accent-cyan);
    }
    .preview-container.active { display: flex; }
    .clear-preview { cursor: pointer; color: #ff4a4a; font-weight: bold; }

    /* ボタン類をすべて内包する統合コンテナ */
    .form-row {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: 22px;
      padding: 4px 6px 4px 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-row:focus-within {
      border-color: var(--accent-purple);
      box-shadow: 0 0 0 1px var(--accent-purple);
    }
    .deck-btn {
      background: none !important;
      border: none !important;
      width: 34px;
      height: 34px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      font-size: 20px;
      color: var(--text-main);
      opacity: 0.6;
      transition: opacity 0.2s, color 0.2s;
      margin-bottom: 1px;
    }
    .deck-btn:hover { opacity: 1; color: var(--accent-cyan); }
    
    .chat-textarea {
      flex: 1;
      background: transparent !important;
      border: none !important;
      color: var(--text-main);
      padding: 8px 4px;
      font-size: 14px;
      resize: none;
      height: 36px;
      max-height: 120px;
      outline: none;
      line-height: 1.4;
    }

    /* 丸型のスタイリッシュな上向き矢印送信ボタン */
    .send-btn {
      background: var(--accent-purple) !important;
      color: #ffffff !important;
      border: none !important;
      width: 32px;
      height: 32px;
      border-radius: 50% !important;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-bottom: 2px;
      padding: 0 !important;
    }
    .send-btn:hover { opacity: 0.9; }
    .send-btn:active { transform: scale(0.95); }

    /* ボトムシート */
    .sheet-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 90; backdrop-filter: blur(2px); }
    .sheet-overlay.open { opacity: 1; pointer-events: auto; }
    .bottom-sheet {
      position: absolute; left: 0; right: 0; bottom: 0; background: var(--bg-pane); border-top: 2px solid var(--accent-purple); border-top-left-radius: 18px; border-top-right-radius: 18px;
      max-height: 75%; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100; display: flex; flex-direction: column;
    }
    .bottom-sheet.open { transform: translateY(0); }
    .sheet-header { padding: 14px 16px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
    .sheet-title { color: var(--text-main); font-weight: 600; font-size: 15px; }
    .new-proj-btn { background: var(--accent-cyan); color: #000000; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .sheet-body { flex: 1; overflow-y: auto; padding: 8px 0 24px; }
    .sheet-item { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-bottom: 1px solid var(--border-color); }
    .sheet-item:hover { background: var(--bg-deck); }
    .sheet-item.active { background: rgba(129, 140, 248, 0.08); }
    .sheet-item.active .sheet-item-name { color: var(--accent-cyan); font-weight: 600; }
    .sheet-item-name { font-size: 14px; color: var(--text-main); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .project-del-btn { color: var(--text-main); opacity: 0.4; padding: 4px; font-size: 14px; transition: opacity 0.2s, color 0.2s; }
    .project-del-btn:hover { color: #ff4a4a; opacity: 1; }

    /* モーダル */
    .modal-mask { position: fixed; top:0; left:0; width:100vw; height:100vh; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 1000; }
    .modal-mask.open { opacity: 1; pointer-events: auto; }
    .modal-window { background: var(--bg-pane); width: 90%; max-width: 420px; border: 1px solid var(--border-color); border-radius: 16px; display: flex; flex-direction: column; max-height: 85vh; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
    .modal-head { padding: 16px; border-bottom: 1px solid var(--border-color); color: var(--text-main); font-weight: 600; font-size: 16px; }
    .modal-body { padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
    .setting-group { display: flex; flex-direction: column; gap: 6px; }
    .setting-label { font-size: 12px; color: var(--text-main); opacity: 0.7; font-weight: 600; }
    .cyber-input { background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-main); padding: 8px 12px; font-size: 13px; outline: none; width: 100%; }
    .cyber-input:focus { border-color: var(--accent-purple); }
    
    .radio-pack { display: flex; flex-direction: column; gap: 8px; }
    .radio-row { display: flex; align-items: center; position: relative; }
    .radio-row input[type="radio"] { display: none; }
    .radio-label { flex: 1; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px 14px; text-align: left; font-size: 13px; cursor: pointer; color: var(--text-main); opacity: 0.8; transition: all 0.2s; }
    .radio-row input[type="radio"]:checked + .radio-label { background: rgba(129, 140, 248, 0.12); border-color: var(--accent-cyan); color: var(--text-main); opacity: 1; font-weight: 600; box-shadow: inset 0 -3px 0 var(--accent-cyan); }
    
    .modal-foot { padding: 12px 16px; border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end; gap: 10px; }
    .btn-secondary { background: var(--bg-deck); border: none; color: var(--text-main); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .btn-primary { background: var(--accent-purple); border: none; color: #ffffff; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
  </style>
</head>
<body>

  <div class="phone-frame">
    <!-- ヘッダーエリア -->
    <header class="header">
      <div class="header-left" onclick="toggleBottomSheet()">
        <button class="top-action-btn" type="button" title="セッション履歴" style="pointer-events: none;">☰</button>
        <div class="header-text-group">
          <h1 class="header-title" id="headerTitle">ロード中...</h1>
          <div class="header-status">✨ クライアント保護モード稼働中</div>
        </div>
      </div>
      <div class="header-right-actions">
        <!-- エクスポートのアイコンを矢印逆に修正 (📤から📥へ) -->
        <button class="top-action-btn" type="button" onclick="exportAllData()" title="即座にJSONエクスポート">📥</button>
        <button class="top-action-btn settings-btn" type="button" onclick="openSettings()" title="システム環境設定">⚙️</button>
      </div>
    </header>

    <!-- コントロールセレクト -->
    <div class="control-container">
      <div class="cyber-select-wrapper">
        <select id="reportTabSelect" class="cyber-select">
          <option value="current">Current</option>
          <option value="knowledge">Knowledge</option>
          <option value="memory">Memory 🧠</option>
          <option value="history">History</option>
        </select>
      </div>
      <div class="cyber-select-wrapper">
        <select id="aiModelSelect" class="cyber-select">
          <option value="gemini">🤖 Gemini</option>
          <option value="claude">🤖 Claude</option>
          <option value="deepseek">🤖 DeepSeek</option>
          <option value="openai">🤖 OpenAI</option>
        </select>
      </div>
    </div>

    <!-- 多層レポートパネル -->
    <section class="report-section" id="reportSection">
      <div class="report-content">
        <div class="report-pane active" id="pane-current"></div>
        <div class="report-pane" id="pane-knowledge"></div>
        <div class="report-pane" id="pane-memory"></div>
        <div class="report-pane" id="pane-history"></div>
      </div>
      <div class="expand-bar" id="expandBar" onclick="toggleReportHeight()">▼ レポート領域を展開 ▼</div>
    </section>

    <!-- タイムライン -->
    <main class="chat-timeline" id="chatHistory"></main>

    <!-- 入力デッキ (添付・送信ボタンを内包化) -->
    <footer class="input-deck">
      <div class="preview-container" id="previewContainer">
        <span id="previewText">📸 添付画像情報</span>
        <span class="clear-preview" onclick="clearAttachment()">✕</span>
      </div>
      <div class="form-row">
        <!-- 内包された添付ボタン -->
        <label class="deck-btn" title="画像を添付">
          📎
          <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleFileSelect(this)">
        </label>
        <!-- メッセージ入力欄 -->
        <textarea class="chat-textarea" id="chatInput" placeholder="メッセージを入力... (Ctrl+Enterで送信)"></textarea>
        <!-- 内包された上向き矢印送信ボタン -->
        <button class="send-btn" type="button" onclick="sendMessage()" title="送信">⬆</button>
      </div>
    </footer>

    <!-- ボトムシート -->
    <div class="sheet-overlay" id="sheetOverlay" onclick="toggleBottomSheet()"></div>
    <div class="bottom-sheet" id="bottomSheet">
      <div class="sheet-header">
        <span class="sheet-title">過去のセッション履歴</span>
        <button class="new-proj-btn" type="button" onclick="triggerNewProject()">＋ 新規生成</button>
      </div>
      <div class="sheet-body">
        <ul id="projectList" style="list-style: none;"></ul>
      </div>
    </div>
  </div>

  <!-- 環境設定モーダル -->
  <div class="modal-mask" id="settingsModal">
    <div class="modal-window">
      <div class="modal-head">🔧 システム環境設定</div>
      <div class="modal-body">
        
        <!-- 裏同期用ダミー -->
        <div class="setting-group" style="display: none;">
          <input type="radio" name="chatAi" id="aiGemini" value="gemini" checked>
          <input type="radio" name="chatAi" id="aiClaude" value="claude">
          <input type="radio" name="chatAi" id="aiDeepSeek" value="deepseek">
          <input type="radio" name="chatAi" id="aiOpenAI" value="openai">
        </div>

        <!-- テーマコンソール -->
        <div class="setting-group">
          <span class="setting-label">カラーテーマ (フォントも連動して切り替わります)</span>
          <div class="radio-pack" style="flex-direction: row; gap: 6px;">
            <div class="radio-row" style="flex: 1;">
              <input type="radio" name="appTheme" id="themeCyber" value="cyber">
              <label for="themeCyber" class="radio-label" style="text-align: center; padding: 10px 4px; font-size: 12px;">Cyber ⚡</label>
            </div>
            <div class="radio-row" style="flex: 1;">
              <input type="radio" name="appTheme" id="themeTech" value="tech" checked>
              <label for="themeTech" class="radio-label" style="text-align: center; padding: 10px 4px; font-size: 12px;">Modern 💻</label>
            </div>
            <div class="radio-row" style="flex: 1;">
              <input type="radio" name="appTheme" id="themeSoft" value="soft">
              <label for="themeSoft" class="radio-label" style="text-align: center; padding: 10px 4px; font-size: 12px;">Soft 🌸</label>
            </div>
          </div>
        </div>

        <!-- 初期ビューの高さ -->
        <div class="setting-group">
          <span class="setting-label">レポート領域の初期高度</span>
          <div class="radio-pack" style="flex-direction:row; gap: 6px;">
            <div class="radio-row" style="flex:1;"><input type="radio" name="repSize" id="sizeMin" value="15"><label for="sizeMin" class="radio-label" style="text-align:center; padding: 10px 4px; font-size: 12px;">Low (15%)</label></div>
            <div class="radio-row" style="flex:1;"><input type="radio" name="repSize" id="sizeMid" value="25" checked><label for="sizeMid" class="radio-label" style="text-align:center; padding: 10px 4px; font-size: 12px;">Mid (25%)</label></div>
            <div class="radio-row" style="flex:1;"><input type="radio" name="repSize" id="sizeMax" value="40"><label for="sizeMax" class="radio-label" style="text-align:center; padding: 10px 4px; font-size: 12px;">High (40%)</label></div>
          </div>
        </div>

        <!-- リアルタイム同期URL -->
        <div class="setting-group">
          <span class="setting-label">リアルタイム同期用 URL (GAS / Webhook)</span>
          <input type="url" id="syncUrl" class="cyber-input" placeholder="https://script.google.com/... などを入力">
        </div>

        <!-- クラウドAPIキースロット -->
        <div class="setting-group">
          <span class="setting-label">Gemini API Key</span>
          <input type="password" id="apiKeyGemini" class="cyber-input" placeholder="AI-Keyを入力...">
        </div>
        <div class="setting-group">
          <span class="setting-label">Anthropic Claude API Key</span>
          <input type="password" id="apiKeyClaude" class="cyber-input" placeholder="sk-ant-を入力...">
        </div>
        <div class="setting-group">
          <span class="setting-label">DeepSeek API Key</span>
          <input type="password" id="apiKeyDeepSeek" class="cyber-input" placeholder="sk-を入力...">
        </div>
        <div class="setting-group">
          <span class="setting-label">OpenAI API Key</span>
          <input type="password" id="apiKeyOpenAI" class="cyber-input" placeholder="sk-proj-を入力...">
        </div>

        <!-- 個人の共有長期記憶 -->
        <div class="setting-group">
          <span class="setting-label">個人メモリ 🧠 (全セッション共有プロファイル)</span>
          <textarea id="personalMemory" class="cyber-input" style="height: 60px; resize: vertical; line-height: 1.4;"></textarea>
        </div>

        <!-- データエクスポート・インポート (矢印を逆に修正) -->
        <div class="setting-group" style="margin-top: 4px; border-top: 1px solid var(--border-color); padding-top: 10px; gap: 6px;">
          <span class="setting-label">データバックアップマネジメント</span>
          <button type="button" class="btn-secondary" style="color:var(--accent-cyan); font-weight:600;" onclick="exportAllData()">📥 ローカルへJSONエクスポート</button>
          <label class="btn-secondary" style="color:var(--accent-purple); text-align:center; display:block; cursor:pointer; font-weight:600;">
            📤 バックアップJSONをインポート
            <input type="file" accept=".json" style="display:none;" onchange="importAllData(this)">
          </label>
        </div>

      </div>
      <div class="modal-foot">
        <button type="button" class="btn-secondary" onclick="closeSettings()">キャンセル</button>
        <button type="button" class="btn-primary" onclick="applyAndCloseSettings()">設定を適用</button>
      </div>
    </div>
  </div>

  <!-- =========================================================================
     3. コアロジック (スワイプ制御追加)
     ========================================================================= -->
  <script>
    const STORAGE_KEY = 'life_report_production_settings_v2';
    const PROJECTS_LIST_KEY = 'life_report_projects_meta_list';
    const CHAT_LOGS_KEY = 'life_report_chat_logs';
    const REPORT_DATA_KEY = 'life_report_panes_data_v2';

    let currentProjectId = '';
    let chatLogs = []; 

    const chatHistory = document.getElementById('chatHistory');
    const chatInput = document.getElementById('chatInput');
    let attachedFileData = null; 
    let attachedFileName = "";

    function getChatLogsKey() { return `${CHAT_LOGS_KEY}_${currentProjectId}`; }
    function getReportDataKey() { return `${REPORT_DATA_KEY}_${currentProjectId}`; }

    async function syncToCloudRealtime() {
      const syncUrlEl = document.getElementById('syncUrl');
      const syncUrl = syncUrlEl && syncUrlEl.value ? syncUrlEl.value.trim() : '';
      if (!syncUrl) return; 

      const payload = {
        projectId: currentProjectId,
        projectName: document.getElementById('headerTitle')?.textContent || '',
        timestamp: new Date().toISOString(),
        report: {
          current: document.getElementById('pane-current')?.innerHTML || '',
          knowledge: document.getElementById('pane-knowledge')?.innerHTML || '',
          memory: document.getElementById('pane-memory')?.innerHTML || '',
          history: document.getElementById('pane-history')?.innerHTML || ''
        },
        chatLogs: chatLogs
      };

      try {
        fetch(syncUrl, {
          method: 'POST',
          mode: 'cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        }).then(res => {
          if (!res.ok) console.warn("同期失敗");
        }).catch(e => {});
      } catch (err) {}
    }

    function getLocalProjectsList() {
      try { return JSON.parse(localStorage.getItem(PROJECTS_LIST_KEY) || '[]'); } catch(e) { return []; }
    }

    function saveLocalProjectsList(list) {
      localStorage.setItem(PROJECTS_LIST_KEY, JSON.stringify(list));
    }

    function createNewProject() {
      let projects = getLocalProjectsList();

      if (projects.length > 0) {
        const latestProj = projects[0];
        const logKey = `${CHAT_LOGS_KEY}_${latestProj.id}`;
        let logs = [];
        try { logs = JSON.parse(localStorage.getItem(logKey) || '[]'); } catch(e) {}
        const hasUserMessage = logs.some(log => log.sender === 'user');

        if (!hasUserMessage) {
          currentProjectId = latestProj.id;
          setActiveProjectUI(latestProj.id, latestProj.name);
          const savedReports = localStorage.getItem(getReportDataKey());
          if (savedReports) { try { applyReportData(JSON.parse(savedReports)); } catch(e) {} }
          chatLogs = logs;
          if (chatHistory) {
            chatHistory.innerHTML = '';
            if (chatLogs.length > 0) {
              chatLogs.forEach(log => appendMessageToUI(log.sender, log.text, log.image));
            } else { setDefaultInitialAIMessage(); }
          }
          renderProjectsList();
          return;
        }
      }

      const id = 'proj_' + Date.now();
      const now = new Date();
      const timeStr = `${now.getMonth() + 1}/${now.getDate()} ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
      const defaultName = `新規プロジェクト (${timeStr})`;

      currentProjectId = id;
      projects.unshift({ id: id, name: defaultName });
      saveLocalProjectsList(projects);

      chatLogs = [];
      localStorage.removeItem(getChatLogsKey());

      const initialReport = {
        current: '<h4>概要</h4><p>新しいプロジェクトが開始されました。開発要件や覚え書き、タスクについて自由に対話を開始してください。</p><h4>決定事項</h4><ul><li>（対話の内容に応じてここに自動集約されます）</li></ul>',
        knowledge: '<h4>ナレッジ</h4><ul><li>（重要なルールや仕様がここに蓄集されます）</li></ul>',
        memory: '<h4>個別メモリ 🧠</h4><p>このプロジェクト固有の状況や背景情報をAIが記憶します。</p>',
        history: '<h4>履歴</h4><ul><li>プロジェクト作成</li></ul>'
      };
      localStorage.setItem(getReportDataKey(), JSON.stringify(initialReport));

      renderProjectsList();
      setActiveProjectUI(id, defaultName);
      applyReportData(initialReport);
      setDefaultInitialAIMessage();

      const reportTabSelect = document.getElementById('reportTabSelect');
      if (reportTabSelect) reportTabSelect.value = 'current';
      switchTab('current');

      saveChatLogs();
      saveReportData();
    }

    function triggerNewProject() {
      createNewProject();
      toggleBottomSheet();
    }

    function renderProjectsList() {
      const listEl = document.getElementById('projectList');
      if (!listEl) return;
      const projects = getLocalProjectsList();
      listEl.innerHTML = '';

      if (projects.length === 0) {
        listEl.innerHTML = '<li class="sheet-item" style="text-align:center; color:var(--accent-cyan); pointer-events:none;">セッション履歴がありません</li>';
        return;
      }

      projects.forEach(proj => {
        const li = document.createElement('li');
        li.className = `sheet-item ${proj.id === currentProjectId ? 'active' : ''}`;
        li.setAttribute('data-id', proj.id);
        
        const nameSpan = document.createElement('span');
        nameSpan.className = 'sheet-item-name';
        nameSpan.textContent = proj.name;
        nameSpan.onclick = () => selectProject(proj.id, proj.name);
        li.appendChild(nameSpan);

        const delBtn = document.createElement('span');
        delBtn.className = 'project-del-btn';
        delBtn.innerHTML = '🗑️';
        delBtn.onclick = (e) => {
          e.stopPropagation();
          deleteProject(proj.id, proj.name);
        };
        li.appendChild(delBtn);

        listEl.appendChild(li);
      });
    }

    function deleteProject(id, name) {
      if (!confirm(`プロジェクト「${name}」を削除しますか？`)) return;

      let projects = getLocalProjectsList();
      projects = projects.filter(p => p.id !== id);
      saveLocalProjectsList(projects);

      localStorage.removeItem(`${CHAT_LOGS_KEY}_${id}`);
      localStorage.removeItem(`${REPORT_DATA_KEY}_${id}`);

      if (currentProjectId === id) {
        if (projects.length > 0) {
          const nextProj = projects[0];
          currentProjectId = nextProj.id;
          setActiveProjectUI(nextProj.id, nextProj.name);

          const savedReports = localStorage.getItem(getReportDataKey());
          if (savedReports) { try { applyReportData(JSON.parse(savedReports)); } catch(e){} }

          const savedLogs = localStorage.getItem(getChatLogsKey());
          try { chatLogs = savedLogs ? JSON.parse(savedLogs) : []; } catch(e) { chatLogs = []; }
          
          if (chatHistory) {
            chatHistory.innerHTML = '';
            if (chatLogs.length > 0) {
              chatLogs.forEach(log => appendMessageToUI(log.sender, log.text, log.image));
            } else { setDefaultInitialAIMessage(); }
            chatHistory.scrollTop = chatHistory.scrollHeight;
          }
        } else { createNewProject(); }
      }
      renderProjectsList();
      syncToCloudRealtime();
    }

    function setActiveProjectUI(id, name) {
      const titleEl = document.getElementById('headerTitle');
      if (titleEl) titleEl.textContent = name;
      
      document.querySelectorAll('#projectList .sheet-item').forEach(item => {
        if (item.getAttribute('data-id') === id) item.classList.add('active');
        else item.classList.remove('active');
      });
    }

    function updateProjectName(id, newName) {
      let projects = getLocalProjectsList();
      const targetProj = projects.find(p => p.id === id);
      if (targetProj) {
        targetProj.name = newName;
        saveLocalProjectsList(projects);
        renderProjectsList();
        const titleEl = document.getElementById('headerTitle');
        if (titleEl && currentProjectId === id) titleEl.textContent = newName;
      }
    }

    function toggleBottomSheet() {
      const sheet = document.getElementById('bottomSheet');
      const overlay = document.getElementById('sheetOverlay');
      if (sheet && overlay) {
        sheet.classList.toggle('open');
        overlay.classList.toggle('open');
      }
    }

    function openSettings() { document.getElementById('settingsModal')?.classList.add('open'); }
    function closeSettings() { document.getElementById('settingsModal')?.classList.remove('open'); }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('settingsModal')?.addEventListener('click', (e) => {
        if (e.target === e.currentTarget) closeSettings();
      });
    });

    function toggleReportHeight() {
      const reportSection = document.getElementById('reportSection');
      const expandBar = document.getElementById('expandBar');
      if (!reportSection || !expandBar) return;
      reportSection.classList.toggle('expanded');
      expandBar.textContent = reportSection.classList.contains('expanded') ? '▲ レポート領域を縮小 ▲' : '▼ レポート領域を展開 ▼';
    }

    function switchTab(tabName) {
      document.querySelectorAll('.report-pane').forEach(pane => pane.classList.remove('active'));
      document.getElementById(`pane-${tabName}`)?.classList.add('active');
    }

    function selectProject(id, name) {
      currentProjectId = id;
      setActiveProjectUI(id, name);

      const savedReports = localStorage.getItem(getReportDataKey());
      if (savedReports) { try { applyReportData(JSON.parse(savedReports)); } catch(e){} }

      const savedLogs = localStorage.getItem(getChatLogsKey());
      if (savedLogs) {
        try { chatLogs = JSON.parse(savedLogs); } catch(e) { chatLogs = []; }
        if (chatHistory) {
          chatHistory.innerHTML = '';
          chatLogs.forEach(log => appendMessageToUI(log.sender, log.text, log.image));
          chatHistory.scrollTop = chatHistory.scrollHeight;
        }
      } else {
        chatLogs = [];
        setDefaultInitialAIMessage();
      }

      const reportTabSelect = document.getElementById('reportTabSelect');
      if (reportTabSelect) reportTabSelect.value = 'current';
      switchTab('current');
      toggleBottomSheet();
    }

    function appendMessageToUI(sender, text, base64Image = null) {
      if (!chatHistory) return;
      const msg = document.createElement('div');
      msg.className = `msg ${sender}`;
      
      if (base64Image) {
        msg.innerHTML = `<img src="${base64Image}" style="max-width: 100%; max-height: 180px; border-radius: 8px; display: block; margin-bottom: 4px;">${text ? text : '📸 画像を送信しました'}`;
      } else {
        let formattedText = (text || '').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        msg.innerHTML = formattedText;
      }
      chatHistory.appendChild(msg);
      if (sender === 'user') chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    function handleFileSelect(input) {
      const file = input.files?.[0];
      if (!file) return;
      if (!file.type.startsWith('image/')) { alert("画像のみサポートしています。"); input.value = ''; return; }
      const reader = new FileReader();
      reader.onload = function(e) {
        attachedFileData = e.target.result; 
        attachedFileName = file.name;
        const container = document.getElementById('previewContainer');
        const text = document.getElementById('previewText');
        if (container && text) { text.textContent = `📸 送信待機中: ${file.name}`; container.classList.add('active'); }
      };
      reader.readAsDataURL(file);
      input.value = '';
    }

    function clearAttachment() {
      attachedFileData = null; attachedFileName = "";
      document.getElementById('previewContainer')?.classList.remove('active');
    }

    async function sendMessage() {
      const inputEl = document.getElementById('chatInput');
      if (!inputEl) return;
      const text = inputEl.value.trim();
      if (!text && !attachedFileData) return;

      appendMessageToUI('user', text, attachedFileData);
      chatLogs.push({ sender: 'user', text: text, image: attachedFileData });
      saveChatLogs();

      inputEl.value = '';
      inputEl.style.height = '36px';
      clearAttachment();
      inputEl.blur();

      await callRealAiApi();
    }

    function setDefaultInitialAIMessage() {
      if (!chatHistory) return;
      chatHistory.innerHTML = '';
      appendMessageToUI('ai', 'LifeReport セッションへようこそ！🚀\n\n画面の「左端」から「右」へスワイプするだけでも、履歴メニューを引き出せるようになりました！');
    }

    async function callRealAiApi() {
      const callingProjectId = currentProjectId; 
      const activeAiRadio = document.querySelector('input[name="chatAi"]:checked');
      const selectedAi = activeAiRadio ? activeAiRadio.value : 'gemini';
      
      const progressMsg = document.createElement('div');
      progressMsg.className = 'msg ai analyzing';
      progressMsg.innerHTML = '<div class="spinner"></div><span class="progress-text">📡 2層メモリ同期中...</span>';
      if (chatHistory) { chatHistory.appendChild(progressMsg); chatHistory.scrollTop = chatHistory.scrollHeight; }

      const currentHTML = document.getElementById('pane-current')?.innerHTML.trim() || '';
      const knowledgeHTML = document.getElementById('pane-knowledge')?.innerHTML.trim() || '';
      const memoryHTML = document.getElementById('pane-memory')?.innerHTML.trim() || '';
      const historyHTML = document.getElementById('pane-history')?.innerHTML.trim() || '';

      const systemInstructionText = `あなたは対話を通じてプロジェクトを構造化し、ユーザーに伴走するLifeReportのコアシステムです。
現在のレポートと個別メモリ（長期記憶）の状態：
【Current】:\n${currentHTML}\n【Knowledge】:\n${knowledgeHTML}\n【Memory】:\n${memoryHTML}\n【History】:\n${historyHTML}

【出力指示】
- チャットの返答は、視認性を重視し、適度に「太字(**)」や「箇条書き(-)」を用いて構造的に回答してください。
- レポートやMemoryを「更新」「追記」する場合は、通常回答の【一番末尾】に以下の特殊タグを使って最新の全HTML構造を含めて出力してください。

<update_current>Current最新HTML</update_current>
<update_knowledge>Knowledge最新HTML</update_knowledge>
<update_memory>Memory最新HTML</update_memory>
<update_history>History最新HTML</update_history>
<update_title>適切なプロジェクト名</update_title>`;

      try {
        let aiResponseText = "";

        if (selectedAi === 'claude') {
          const apiKey = document.getElementById('apiKeyClaude')?.value.trim() || '';
          if (!apiKey) throw new Error("Claude APIキーが未設定です。");
          const messages = [];
          chatLogs.forEach(log => {
            let contentPayload = [];
            if (log.text) contentPayload.push({ type: "text", text: log.text });
            if (log.image) {
              const commaIdx = log.image.indexOf(',');
              const mediaType = log.image.substring(5, log.image.indexOf(';'));
              const base64Data = log.image.substring(commaIdx + 1);
              contentPayload.push({ type: "image", source: { type: "base64", media_type: mediaType, data: base64Data } });
            }
            messages.push({ role: log.sender === 'user' ? 'user' : 'assistant', content: contentPayload });
          });
          const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
            body: JSON.stringify({ model: 'claude-3-5-sonnet-latest', system: systemInstructionText, max_tokens: 4000, messages: messages })
          });
          const resData = await response.json();
          if (resData.error) throw new Error(resData.error.message);
          aiResponseText = resData.content[0].text;

        } else if (selectedAi === 'deepseek') {
          const apiKey = document.getElementById('apiKeyDeepSeek')?.value.trim() || '';
          if (!apiKey) throw new Error("DeepSeek APIキーが未設定です。");
          const messages = [{ role: "system", content: systemInstructionText }];
          chatLogs.forEach(log => { messages.push({ role: log.sender === 'user' ? 'user' : 'assistant', content: log.text || "" }); });
          const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
            body: JSON.stringify({ model: 'deepseek-chat', messages: messages })
          });
          const resData = await response.json();
          if (resData.error) throw new Error(resData.error.message);
          aiResponseText = resData.choices[0].message.content;

        } else if (selectedAi === 'gemini') {
          const apiKey = document.getElementById('apiKeyGemini')?.value.trim() || '';
          if (!apiKey) throw new Error("Gemini APIキーが未設定です。");
          const contents = chatLogs.map(log => {
            const parts = [];
            if (log.text) parts.push({ text: log.text });
            if (log.image) {
              const commaIndex = log.image.indexOf(',');
              const mimeType = log.image.substring(5, log.image.indexOf(';'));
              const base64Data = log.image.substring(commaIndex + 1);
              parts.push({ inlineData: { mimeType: mimeType, data: base64Data } });
            }
            return { role: log.sender === 'user' ? 'user' : 'model', parts: parts.length > 0 ? parts : [{text:""}] };
          });
          if (contents.length > 0 && contents[contents.length - 1].role === 'user') {
            let textPart = contents[contents.length - 1].parts.find(p => p.text !== undefined);
            if (!textPart) { textPart = { text: "" }; contents[contents.length - 1].parts.unshift(textPart); }
            textPart.text = `${systemInstructionText}\n\n----------------------------------------\n指示: ${textPart.text || ""}`;
          }
          const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: contents })
          });
          const resData = await response.json();
          if (resData.error) throw new Error(resData.error.message);
          aiResponseText = resData.candidates[0].content.parts[0].text;

        } else if (selectedAi === 'openai') {
          const apiKey = document.getElementById('apiKeyOpenAI')?.value.trim() || '';
          if (!apiKey) throw new Error("OpenAI APIキーが未設定です。");
          const messages = [{ role: "system", content: systemInstructionText }];
          chatLogs.forEach(log => {
            let contentPayload = [];
            if (log.text) contentPayload.push({ type: "text", text: log.text });
            if (log.image) contentPayload.push({ type: "image_url", image_url: { url: log.image } });
            messages.push({ role: log.sender === 'user' ? 'user' : 'assistant', content: contentPayload.length > 0 ? contentPayload : (log.text || "") });
          });
          const response = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
            body: JSON.stringify({ model: 'gpt-4o-mini', messages: messages })
          });
          const resData = await response.json();
          if (resData.error) throw new Error(resData.error.message);
          aiResponseText = resData.choices[0].message.content;
        }

        let reportUpdated = false;
        const currentMatch = aiResponseText.match(/<update_current>([\s\S]*?)<\/update_current>/);
        const knowledgeMatch = aiResponseText.match(/<update_knowledge>([\s\S]*?)<\/update_knowledge>/);
        const memoryMatch = aiResponseText.match(/<update_memory>([\s\S]*?)<\/update_memory>/);
        const historyMatch = aiResponseText.match(/<update_history>([\s\S]*?)<\/update_history>/);
        const titleMatch = aiResponseText.match(/<update_title>([\s\S]*?)<\/update_title>/);

        if (currentMatch || knowledgeMatch || memoryMatch || historyMatch) reportUpdated = true;

        let cleanResponseText = aiResponseText
          .replace(/<update_current>[\s\S]*?<\/update_current>/g, '')
          .replace(/<update_knowledge>[\s\S]*?<\/update_knowledge>/g, '')
          .replace(/<update_memory>[\s\S]*?<\/update_memory>/g, '')
          .replace(/<update_history>[\s\S]*?<\/update_history>/g, '')
          .replace(/<update_title>[\s\S]*?<\/update_title>/g, '')
          .trim();

        if (callingProjectId === currentProjectId) {
          if (currentMatch && document.getElementById('pane-current')) document.getElementById('pane-current').innerHTML = currentMatch[1].trim();
          if (knowledgeMatch && document.getElementById('pane-knowledge')) document.getElementById('pane-knowledge').innerHTML = knowledgeMatch[1].trim();
          if (memoryMatch && document.getElementById('pane-memory')) document.getElementById('pane-memory').innerHTML = memoryMatch[1].trim();
          if (historyMatch && document.getElementById('pane-history')) document.getElementById('pane-history').innerHTML = historyMatch[1].trim();
          if (titleMatch) updateProjectName(currentProjectId, titleMatch[1].trim());

          if (reportUpdated) saveReportData();
          progressMsg.classList.remove('analyzing');
          progressMsg.innerHTML = cleanResponseText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
          chatLogs.push({ sender: 'ai', text: cleanResponseText, image: null });
          saveChatLogs();
          if (chatHistory) chatHistory.scrollTop = chatHistory.scrollHeight;
        } else {
          if (reportUpdated) {
            const repKey = `${REPORT_DATA_KEY}_${callingProjectId}`;
            let savedRep = {}; try { savedRep = JSON.parse(localStorage.getItem(repKey) || '{}'); } catch(e){}
            if (currentMatch) savedRep.current = currentMatch[1].trim();
            if (knowledgeMatch) savedRep.knowledge = knowledgeMatch[1].trim();
            if (memoryMatch) savedRep.memory = memoryMatch[1].trim();
            if (historyMatch) savedRep.history = historyMatch[1].trim();
            localStorage.setItem(repKey, JSON.stringify(savedRep));
          }
          if (titleMatch) {
            let projects = getLocalProjectsList();
            const proj = projects.find(p => p.id === callingProjectId);
            if (proj) { proj.name = titleMatch[1].trim(); saveLocalProjectsList(projects); renderProjectsList(); }
          }
          const logKey = `${CHAT_LOGS_KEY}_${callingProjectId}`;
          let origLogs = []; try { origLogs = JSON.parse(localStorage.getItem(logKey) || '[]'); } catch(e){}
          origLogs.push({ sender: 'ai', text: cleanResponseText, image: null });
          localStorage.setItem(logKey, JSON.stringify(origLogs));
        }

      } catch (err) {
        if (callingProjectId === currentProjectId && progressMsg) {
          progressMsg.classList.remove('analyzing'); progressMsg.style.border = "1px solid #ff0055"; progressMsg.style.color = "#ff66a3"; progressMsg.textContent = `❌ エラー: ${err.message}`;
        }
      }
    }

    function applyAndCloseSettings() { saveSettings(); closeSettings(); }

    function saveSettings() {
      const activeAiRadio = document.querySelector('input[name="chatAi"]:checked');
      const chatAi = activeAiRadio ? activeAiRadio.value : 'gemini';
      
      const activeRepSize = document.querySelector('input[name="repSize"]:checked');
      const repSize = activeRepSize ? activeRepSize.value : '25';
      
      const apiKeyGemini = document.getElementById('apiKeyGemini')?.value.trim() || '';
      const apiKeyClaude = document.getElementById('apiKeyClaude')?.value.trim() || '';
      const apiKeyDeepSeek = document.getElementById('apiKeyDeepSeek')?.value.trim() || '';
      const apiKeyOpenAI = document.getElementById('apiKeyOpenAI')?.value.trim() || '';
      const personalMemory = document.getElementById('personalMemory')?.value.trim() || '';
      
      const activeTheme = document.querySelector('input[name="appTheme"]:checked');
      const appTheme = activeTheme ? activeTheme.value : 'tech';
      const syncUrl = document.getElementById('syncUrl')?.value.trim() || '';
      
      const settings = { chatAi, repSize, apiKeyGemini, apiKeyClaude, apiKeyDeepSeek, apiKeyOpenAI, personalMemory, appTheme, syncUrl };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
      
      if (repSize) { document.getElementById('reportSection')?.style.setProperty('--default-height', `${repSize}%`); }

      document.body.classList.remove('theme-cyber', 'theme-tech', 'theme-soft');
      document.body.classList.add(`theme-${appTheme}`);

      if (typeof window.updateAiQuickUI === 'function') window.updateAiQuickUI();
      syncToCloudRealtime();
    }

    function saveChatLogs() {
      if (chatLogs.length > 80) chatLogs = chatLogs.slice(-80);
      localStorage.setItem(getChatLogsKey(), JSON.stringify(chatLogs));
      syncToCloudRealtime();
    }

    function saveReportData() {
      const reportData = {
        current: document.getElementById('pane-current')?.innerHTML || '',
        knowledge: document.getElementById('pane-knowledge')?.innerHTML || '',
        memory: document.getElementById('pane-memory')?.innerHTML || '',
        history: document.getElementById('pane-history')?.innerHTML || ''
      };
      localStorage.setItem(getReportDataKey(), JSON.stringify(reportData));
      syncToCloudRealtime();
    }

    function exportAllData() {
      const backup = {};
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith('life_report_')) backup[key] = localStorage.getItem(key);
      }
      const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `lifereport_backup_${Date.now()}.json`; a.click();
    }

    function importAllData(input) {
      const file = input.files?.[0]; if (!file) return;
      if (!confirm("既存の全データが上書きされます。よろしいですか？")) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          for (let i = localStorage.length - 1; i >= 0; i--) {
            const key = localStorage.key(i); if (key && key.startsWith('life_report_')) localStorage.removeItem(key);
          }
          for (const key in data) { if (key.startsWith('life_report_')) localStorage.setItem(key, data[key]); }
          alert("インポート成功！再起動します。");
          window.location.reload();
        } catch (err) { alert("失敗: " + err.message); }
      };
      reader.readAsText(file);
    }

    function applyLoadedSettings(settings) {
      if (!settings) return;
      if (settings.chatAi) { const radio = document.querySelector(`input[name="chatAi"][value="${settings.chatAi}"]`); if (radio) radio.checked = true; }
      if (settings.repSize) { 
        const radio = document.querySelector(`input[name="repSize"][value="${settings.repSize}"]`); if (radio) radio.checked = true; 
        document.getElementById('reportSection')?.style.setProperty('--default-height', `${settings.repSize}%`); 
      }
      if (settings.apiKeyGemini && document.getElementById('apiKeyGemini')) document.getElementById('apiKeyGemini').value = settings.apiKeyGemini;
      if (settings.apiKeyClaude && document.getElementById('apiKeyClaude')) document.getElementById('apiKeyClaude').value = settings.apiKeyClaude;
      if (settings.apiKeyDeepSeek && document.getElementById('apiKeyDeepSeek')) document.getElementById('apiKeyDeepSeek').value = settings.apiKeyDeepSeek;
      if (settings.apiKeyOpenAI && document.getElementById('apiKeyOpenAI')) document.getElementById('apiKeyOpenAI').value = settings.apiKeyOpenAI;
      
      if (settings.appTheme) {
        const themeRadio = document.querySelector(`input[name="appTheme"][value="${settings.appTheme}"]`);
        if (themeRadio) themeRadio.checked = true;
        document.body.classList.remove('theme-cyber', 'theme-tech', 'theme-soft');
        document.body.classList.add(`theme-${settings.appTheme}`);
      }
      if (settings.syncUrl && document.getElementById('syncUrl')) document.getElementById('syncUrl').value = settings.syncUrl;
      if (settings.personalMemory && document.getElementById('personalMemory')) document.getElementById('personalMemory').value = settings.personalMemory;
      if (typeof window.updateAiQuickUI === 'function') window.updateAiQuickUI();
    }

    function applyReportData(data) {
      if (!data) return;
      if (data.current && document.getElementById('pane-current')) document.getElementById('pane-current').innerHTML = data.current;
      if (data.knowledge && document.getElementById('pane-knowledge')) document.getElementById('pane-knowledge').innerHTML = data.knowledge;
      if (data.memory && document.getElementById('pane-memory')) document.getElementById('pane-memory').innerHTML = data.memory;
      if (data.history && document.getElementById('pane-history')) document.getElementById('pane-history').innerHTML = data.history;
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('reportTabSelect')?.addEventListener('change', (e) => switchTab(e.target.value));
      document.getElementById('aiModelSelect')?.addEventListener('change', (e) => {
        const targetRadio = document.querySelector(`input[name="chatAi"][value="${e.target.value}"]`);
        if (targetRadio) { targetRadio.checked = true; saveSettings(); }
      });

      window.updateAiQuickUI = function() {
        const activeAiRadio = document.querySelector('input[name="chatAi"]:checked');
        const selectEl = document.getElementById('aiModelSelect');
        if (selectEl && activeAiRadio) selectEl.value = activeAiRadio.value;
      };

      const inputEl = document.getElementById('chatInput');
      if (inputEl) {
        inputEl.addEventListener('input', () => {
          inputEl.style.height = '36px';
          inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
        });
        inputEl.addEventListener('keydown', (e) => {
          if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); sendMessage(); }
        });
      }

      /* =========================================================================
         【新規追加】左から右へのエッジスワイプでボトムシート(メニュー)を開く
         ========================================================================= */
      let touchStartX = 0;
      let touchStartY = 0;
      const phoneFrame = document.querySelector('.phone-frame');

      phoneFrame.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      }, { passive: true });

      phoneFrame.addEventListener('touchend', (e) => {
        const touchEndX = e.changedTouches[0].clientX;
        const touchEndY = e.changedTouches[0].clientY;
        const diffX = touchEndX - touchStartX;
        const diffY = Math.abs(touchEndY - touchStartY);

        // 画面左端付近(60px以内)からのスタート、かつ右方向へのしっかりしたスワイプ、かつ縦ブレが少ない場合
        if (touchStartX < 60 && diffX > 60 && diffY < 40) {
          const sheet = document.getElementById('bottomSheet');
          if (sheet && !sheet.classList.contains('open')) {
            toggleBottomSheet();
          }
        }
      }, { passive: true });
      /* ========================================================================= */

      const savedUI = localStorage.getItem(STORAGE_KEY);
      if (savedUI) { try { applyLoadedSettings(JSON.parse(savedUI)); } catch(e){} }

      const projects = getLocalProjectsList();
      if (projects.length > 0) {
        const latest = projects[0];
        currentProjectId = latest.id;
        setActiveProjectUI(latest.id, latest.name);
        const savedReports = localStorage.getItem(getReportDataKey());
        if (savedReports) { try { applyReportData(JSON.parse(savedReports)); } catch(e){} }
        const savedLogs = localStorage.getItem(getChatLogsKey());
        if (savedLogs) {
          try { chatLogs = JSON.parse(savedLogs); } catch(e) { chatLogs = []; }
          if (chatHistory) {
            chatHistory.innerHTML = '';
            chatLogs.forEach(log => appendMessageToUI(log.sender, log.text, log.image));
            chatHistory.scrollTop = chatHistory.scrollHeight;
          }
        } else { setDefaultInitialAIMessage(); }
        renderProjectsList();
      } else { createNewProject(); }

      if (typeof window.updateAiQuickUI === 'function') window.updateAiQuickUI();
    });
  </script>
</body>
</html>
