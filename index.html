<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Report - AI Copilot</title>
  
  <!-- 視認性と美しさを両立するフォント（Inter + Noto Sans JP）の導入 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  
  <!-- Markdownパース用ライブラリ -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    /* =========================================================================
       1. トリプルテーマ定義（コントラストと視認性の最適化）
       ========================================================================= */
    :root {
      /* Default: Modern (ラグジュアリー・モーヴモダン) */
      --bg-body: linear-gradient(135deg, #120e18 0%, #1a1422 50%, #140f1c 100%);
      --bg-frame: rgba(24, 19, 30, 0.93);      
      --bg-deck: rgba(34, 26, 42, 0.96);       
      --bg-pane: rgba(28, 21, 35, 0.88);
      --bg-input: rgba(44, 33, 56, 0.75);
      --text-main: #f5f2f7;     
      --accent-cyan: #e8b9ba;   /* 優美なローズシャンパン */
      --accent-purple: #dfc5a0; /* 洗練されたアンティークゴールド */
      --border-color: rgba(255, 255, 255, 0.08);  
      --msg-user-bg: linear-gradient(135deg, #a87883, #675271); 
      --msg-user-text: #ffffff;
      --msg-ai-bg: rgba(38, 29, 48, 0.65);
      --msg-ai-border: rgba(232, 185, 186, 0.25);
      --select-bg: #221a2a;
      --font-app: 'Inter', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --report-height: 25dvh;   
    }

    body.theme-tech {
      --bg-body: linear-gradient(135deg, #120e18 0%, #1a1422 50%, #140f1c 100%);
      --bg-frame: rgba(24, 19, 30, 0.93);      
      --bg-deck: rgba(34, 26, 42, 0.96);       
      --bg-pane: rgba(28, 21, 35, 0.88);
      --bg-input: rgba(44, 33, 56, 0.75);
      --text-main: #f5f2f7;     
      --accent-cyan: #e8b9ba;   
      --accent-purple: #dfc5a0; 
      --border-color: rgba(255, 255, 255, 0.08);  
      --msg-user-bg: linear-gradient(135deg, #a87883, #675271); 
      --msg-user-text: #ffffff;
      --msg-ai-bg: rgba(38, 29, 48, 0.65);
      --msg-ai-border: rgba(232, 185, 186, 0.25);
      --select-bg: #221a2a;
    }

    body.theme-cyber {
      /* Cyberpunk (ナイト・ネオン) */
      --bg-body: #050508;
      --bg-frame: #0b0c10;
      --bg-deck: #141722;
      --bg-pane: #0f111a;
      --bg-input: #1b1f2f;
      --text-main: #f0f5fa;
      --accent-cyan: #00f5ff;
      --accent-purple: #bd00ff;
      --border-color: rgba(0, 245, 255, 0.18);
      --msg-user-bg: linear-gradient(135deg, #bd00ff, #00f5ff);
      --msg-user-text: #050508;
      --msg-ai-bg: #0f111a;
      --msg-ai-border: rgba(0, 245, 255, 0.45);
      --select-bg: #141722;
    }

    body.theme-soft {
      /* Soft (エクリュ・リネン) */
      --bg-body: linear-gradient(135deg, #f5f2eb 0%, #eae5dc 100%);
      --bg-frame: rgba(255, 255, 255, 0.96);
      --bg-deck: #e8e2d6;
      --bg-pane: #fdfcfb;
      --bg-input: #f4efe5;
      --text-main: #2d2922; 
      --accent-cyan: #39634f; 
      --accent-purple: #925b67; 
      --border-color: rgba(130, 120, 100, 0.25);
      --msg-user-bg: #dbaea6;
      --msg-user-text: #2d2922;
      --msg-ai-bg: #fdfcfb;
      --msg-ai-border: rgba(130, 120, 100, 0.35);
      --select-bg: #f4efe5;
    }

    /* =========================================================================
       2. 基本構造 & スタイリング
       ========================================================================= */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: var(--font-app);
      letter-spacing: 0.02em; 
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.22); }
    body.theme-soft ::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.15); }

    body {
      background: var(--bg-body);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100dvh;
      overflow: hidden;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .phone-frame {
      width: 100%;
      max-width: 480px;
      height: 100dvh;
      background: var(--bg-frame);
      backdrop-filter: blur(25px); 
      -webkit-backdrop-filter: blur(25px);
      border-left: 1px solid var(--border-color);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    .header {
      background: var(--bg-deck);
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-bottom: 1px solid var(--border-color);
      min-height: 56px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
    }
    .header-text-group {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      width: 100%;
    }
    .header-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: 0.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    /* 多層レポートパネル */
    .report-section {
      height: var(--report-height);
      background: var(--bg-pane);
      display: flex;
      flex-direction: column;
      transition: height 0.35s cubic-bezier(0.25, 1, 0.5, 1);
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid var(--border-color);
    }
    .report-content { flex: 1; overflow-y: auto; padding: 16px; user-select: text; }
    .report-pane { display: none; font-size: 13.5px; line-height: 1.65; }
    .report-pane.active { display: block; animation: fadeIn 0.2s ease-out; }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: translateY(0); } }

    .report-pane h4 {
      color: var(--accent-cyan); font-size: 14px; margin-top: 18px; margin-bottom: 8px;
      border-left: 3px solid var(--accent-cyan); padding-left: 8px; font-weight: 700;
    }
    .report-pane h4:first-child { margin-top: 0; }
    .report-pane p { margin-bottom: 8px; color: var(--text-main); opacity: 0.95; }
    .report-pane ul { margin-left: 18px; margin-bottom: 10px; }
    .report-pane li { margin-bottom: 5px; opacity: 0.95; }

    /* コントロールバー構造 */
    .control-expand-bar {
      background: var(--bg-deck);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      gap: 12px;
      z-index: 20;
      user-select: none;
    }
    .control-left-flex {
      display: flex;
      flex-direction: row;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }
    
    .control-right-area {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex: 1;
      border-left: 1px solid var(--border-color);
      padding-left: 12px;
      height: 32px;
    }
    .expand-trigger-btn {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-main);
      opacity: 0.8;
      cursor: pointer;
      padding: 6px 0;
      letter-spacing: 0.5px;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .expand-trigger-btn:hover { opacity: 1; color: var(--accent-cyan); }

    .mini-select-wrapper {
      position: relative;
      width: 105px;
    }
    .mini-select {
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      background: var(--bg-input);
      color: var(--text-main);
      font-size: 11px;
      font-weight: 600;
      padding: 6px 18px 6px 8px;
      border-radius: 6px;
      outline: none;
      cursor: pointer;
      border: 1px solid var(--border-color);
      text-overflow: ellipsis;
      white-space: nowrap;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .mini-select:focus { border-color: var(--accent-cyan); }
    .mini-select-wrapper::after {
      content: '▼';
      font-size: 7px;
      position: absolute;
      right: 7px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      opacity: 0.6;
    }

    .inline-export-btn {
      background: none;
      border: none;
      color: var(--text-main);
      font-size: 16px;
      cursor: pointer;
      opacity: 0.75;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
      border-radius: 6px;
    }
    .inline-export-btn:hover { opacity: 1; transform: scale(1.05); color: var(--accent-cyan); background: rgba(255,255,255,0.05); }

    /* タイムライン */
    .chat-timeline {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: transparent;
    }
    .msg {
      max-width: 85%; padding: 12px 16px; border-radius: 14px; font-size: 14px; line-height: 1.65; word-break: break-word; white-space: pre-wrap; user-select: text;
    }
    .msg.user {
      align-self: flex-end; background: var(--msg-user-bg); color: var(--msg-user-text); border-bottom-right-radius: 2px; box-shadow: 0 4px 12px rgba(165, 117, 128, 0.12);
      font-weight: 500;
    }
    
    /* 【修正】AIの返答をテキストボックス（吹き出し）にせず画面いっぱいに広げる */
    .msg.ai {
      align-self: flex-start;
      max-width: 100%;
      width: 100%;
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      padding: 12px 0;
      border-radius: 0;
      white-space: normal;
    }
    .msg.ai strong { color: var(--accent-cyan); font-weight: 700; }
    
    .msg.ai code {
      font-family: var(--font-mono); background: rgba(255,255,255,0.12); color: var(--accent-purple); padding: 2px 5px; border-radius: 4px; font-size: 13px; margin: 0 2px;
    }
    body.theme-soft .msg.ai code { background: rgba(0,0,0,0.06); color: var(--accent-purple); }

    /* Markdownレンダリング時の視認性最適化 */
    .msg.ai h1, .msg.ai h2, .msg.ai h3, .msg.ai h4 { color: var(--accent-cyan); margin: 14px 0 8px 0; font-size: 14.5px; font-weight: 700; }
    .msg.ai p { margin-bottom: 8px; }
    .msg.ai ul, .msg.ai ol { margin-left: 20px; margin-bottom: 8px; }
    .msg.ai li { margin-bottom: 4px; }
    
    /* Markdownテーブル用デザイン */
    .msg.ai table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 12.5px; }
    .msg.ai th, .msg.ai td { border: 1px solid var(--border-color); padding: 8px 10px; text-align: left; line-height: 1.5; }
    .msg.ai th { background: rgba(255, 255, 255, 0.08); color: var(--accent-purple); font-weight: 700; }
    body.theme-soft .msg.ai th { background: rgba(0, 0, 0, 0.04); }

    .msg.analyzing { display: flex; align-items: center; gap: 10px; color: var(--accent-cyan); background: rgba(229, 179, 180, 0.05); border: 1px dashed var(--accent-cyan); font-weight: 500; max-width: 85%; border-radius: 14px; padding: 12px 16px; }
    .spinner { width: 14px; height: 14px; border: 2px solid var(--border-color); border-top-color: var(--accent-cyan); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 入力デッキ */
    .input-deck {
      background: var(--bg-deck); padding: 12px 14px; border-top: 1px solid var(--border-color); z-index: 10;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.03);
    }
    .preview-container {
      display: none; background: var(--bg-pane); padding: 8px 12px; border-radius: 8px; margin-bottom: 8px;
      font-size: 12px; color: var(--accent-cyan); align-items: center; justify-content: space-between; border: 1px dashed var(--accent-cyan); font-weight: 500;
    }
    .preview-container.active { display: flex; }
    .clear-preview { cursor: pointer; color: #ff4a4a; font-weight: bold; padding: 2px 6px; }

    .form-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 4px 6px 4px 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-row:focus-within {
      border-color: var(--accent-purple);
      box-shadow: 0 0 0 1px var(--accent-purple);
    }
    
    .deck-btn {
      background: none !important;
      border: none !important;
      width: 32px;
      height: 32px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      font-size: 16px;
      color: var(--text-main);
      opacity: 0.75;
      transition: all 0.2s ease;
      margin-bottom: 2px;
      overflow: hidden;
      border-radius: 50%;
    }
    .deck-btn:hover { opacity: 1; color: var(--accent-cyan); background: rgba(255,255,255,0.05); }
    
    #menuBtn.hidden {
      opacity: 0;
      width: 0px;
      margin-right: -8px;
      pointer-events: none;
    }
    
    .chat-textarea {
      flex: 1;
      background: transparent !important;
      border: none !important;
      color: var(--text-main);
      padding: 8px 2px;
      font-size: 14px;
      resize: none;
      height: 36px;
      max-height: 140px;
      outline: none;
      line-height: 1.45;
    }

    .send-btn {
      background: var(--accent-purple) !important;
      color: #140f1a !important;
      border: none !important;
      width: 32px;
      height: 32px;
      border-radius: 50% !important;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-bottom: 2px;
      padding: 0 !important;
      box-shadow: 0 2px 8px rgba(222, 193, 153, 0.25);
    }
    body.theme-cyber .send-btn { color: #ffffff !important; }
    .send-btn:hover { opacity: 0.9; }
    .send-btn:active { transform: scale(0.95); }

    /* ボトムシート */
    .sheet-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 90; backdrop-filter: blur(4px); }
    .sheet-overlay.open { opacity: 1; pointer-events: auto; }
    .bottom-sheet {
      position: absolute; left: 0; right: 0; bottom: 0; background: var(--bg-pane); border-top: 2px solid var(--accent-purple); border-top-left-radius: 20px; border-top-right-radius: 20px;
      max-height: 75%; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); z-index: 100; display: flex; flex-direction: column;
      box-shadow: 0 -10px 30px rgba(0,0,0,0.2);
    }
    .bottom-sheet.open { transform: translateY(0); }
    
    .sheet-header { padding: 16px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
    .sheet-title { color: var(--text-main); font-weight: 700; font-size: 14.5px; }
    .sheet-header-actions { display: flex; align-items: center; gap: 10px; }
    
    .sheet-gear-btn {
      background: none;
      border: none;
      color: var(--text-main);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      opacity: 0.85;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background: var(--bg-input);
    }
    .sheet-gear-btn:hover { opacity: 1; color: var(--accent-cyan); border-color: var(--accent-cyan); }
    .new-proj-btn { background: var(--accent-cyan); color: #140f1a; border: none; padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; box-shadow: 0 2px 8px rgba(229,179,180,0.2); }
    body.theme-cyber .new-proj-btn { color: #050508; }
    
    .sheet-body { flex: 1; overflow-y: auto; padding: 8px 0 24px; }
    .sheet-item { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-bottom: 1px solid var(--border-color); transition: background 0.2s; }
    .sheet-item:hover { background: var(--bg-deck); }
    .sheet-item.active { background: rgba(165, 117, 128, 0.08); }
    .sheet-item.active .sheet-item-name { color: var(--accent-cyan); font-weight: 700; }
    .sheet-item-name { font-size: 14px; color: var(--text-main); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 12px; }
    .project-del-btn { color: var(--text-main); opacity: 0.4; padding: 6px; font-size: 13px; transition: all 0.2s; border-radius: 4px; }
    .project-del-btn:hover { color: #ff4a4a; opacity: 1; background: rgba(255,74,74,0.05); }

    /* モーダル */
    .modal-mask { position: fixed; top:0; left:0; width:100vw; height:100vh; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.25s ease; z-index: 1000; }
    .modal-mask.open { opacity: 1; pointer-events: auto; }
    .modal-window { background: var(--bg-pane); width: 92%; max-width: 430px; border: 1px solid var(--border-color); border-radius: 18px; display: flex; flex-direction: column; max-height: 85vh; box-shadow: 0 20px 40px rgba(0,0,0,0.4); overflow: hidden; }
    .modal-head { padding: 18px 20px; border-bottom: 1px solid var(--border-color); color: var(--text-main); font-weight: 700; font-size: 15px; letter-spacing: 0.5px; }
    .modal-body { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
    .setting-group { display: flex; flex-direction: column; gap: 6px; }
    .setting-label { font-size: 11.5px; color: var(--text-main); opacity: 0.75; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
    .cyber-input { background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-main); padding: 9px 12px; font-size: 13.5px; outline: none; width: 100%; transition: border-color 0.2s; }
    .cyber-input:focus { border-color: var(--accent-purple); }
    
    .radio-pack { display: flex; flex-direction: column; gap: 8px; }
    .radio-row { display: flex; align-items: center; position: relative; }
    .radio-row input[type="radio"] { display: none; }
    .radio-row input[type="radio"]:checked + .radio-label { background: rgba(165, 117, 128, 0.12); border-color: var(--accent-cyan); color: var(--text-main); opacity: 1; font-weight: 700; box-shadow: inset 0 -3px 0 var(--accent-cyan); }
    
    .preset-btn-group { display: flex; gap: 6px; }
    .preset-btn { flex: 1; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-main); padding: 8px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .preset-btn:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }

    .modal-foot { padding: 14px 20px; border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end; gap: 10px; background: rgba(0,0,0,0.05); }
    .btn-secondary { background: var(--bg-deck); border: none; color: var(--text-main); padding: 9px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: background 0.2s; }
    .btn-secondary:hover { background: rgba(255,255,255,0.05); }
    body.theme-soft .btn-secondary:hover { background: rgba(0,0,0,0.05); }
    .btn-primary { background: var(--accent-purple); border: none; color: #140f1a; padding: 9px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 700; box-shadow: 0 2px 8px rgba(222, 193, 153, 0.25); }
    body.theme-cyber .btn-primary { color: #ffffff; }
    .btn-primary:hover { opacity: 0.9; }
  </style>
</head>
<body>

  <div class="phone-frame">
    <header class="header">
      <div class="header-text-group">
        <h1 class="header-title" id="headerProjectName">ロード中...</h1>
        <button class="inline-export-btn" type="button" onclick="exportAllData()" title="即座にJSONエクスポート">📥</button>
      </div>
    </header>

    <!-- 多層レポートパネル -->
    <section class="report-section" id="reportSection">
      <div class="report-content">
        <div class="report-pane active" id="pane-current"></div>
        <div class="report-pane" id="pane-knowledge"></div>
        <div class="report-pane" id="pane-memory"></div>
        <div class="report-pane" id="pane-history"></div>
      </div>
    </section>

    <!-- コントロール・展開バー -->
    <div class="control-expand-bar">
      <div class="control-left-flex">
        <div class="mini-select-wrapper">
          <select id="reportTabSelect" class="mini-select">
            <option value="current">Current</option>
            <option value="knowledge">Knowledge</option>
            <option value="memory">Memory 🧠</option>
            <option value="history">History</option>
          </select>
        </div>
        <div class="mini-select-wrapper">
          <select id="aiModelSelect" class="mini-select">
            <option value="gemini">🤖 Gemini</option>
            <option value="claude">🤖 Claude</option>
            <option value="deepseek">🤖 DeepSeek</option>
            <option value="openai">🤖 OpenAI</option>
          </select>
        </div>
      </div>
      
      <div class="control-right-area">
        <div class="expand-trigger-btn" id="expandBar" onclick="toggleReportHeight()">展開 ▼</div>
      </div>
    </div>

    <!-- タイムライン -->
    <main class="chat-timeline" id="chatHistory"></main>

    <!-- 入力デッキ -->
    <footer class="input-deck">
      <div class="preview-container" id="previewContainer">
        <span id="previewText">📸 添付画像情報</span>
        <span class="clear-preview" onclick="clearAttachment()">✕</span>
      </div>
      <div class="form-row">
        <button class="deck-btn" id="menuBtn" type="button" onclick="toggleBottomSheet()" title="セッション履歴">☰</button>
        <label class="deck-btn" title="画像を添付">
          📎
          <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleFileSelect(this)">
        </label>
        <textarea class="chat-textarea" id="chatInput" placeholder="メッセージを入力... (Ctrl+Enterで送信)"></textarea>
        <button class="send-btn" type="button" onclick="sendMessage()" title="送信">⬆</button>
      </div>
    </footer>

    <!-- ボトムシート（履歴メニュー） -->
    <div class="sheet-overlay" id="sheetOverlay" onclick="toggleBottomSheet()"></div>
    <div class="bottom-sheet" id="bottomSheet">
      <div class="sheet-header">
        <span class="sheet-title">過去のセッション履歴</span>
        <div class="sheet-header-actions">
          <button class="sheet-gear-btn" type="button" onclick="openSettings()" title="システム環境設定">⚙️ 設定</button>
          <button class="new-proj-btn" type="button" onclick="triggerNewProject()">＋ 新規生成</button>
        </div>
      </div>
      <div class="sheet-body">
        <ul id="projectList" style="list-style: none;"></ul>
      </div>
    </div>
  </div>

  <!-- 環境設定モーダル -->
  <div class="modal-mask" id="settingsModal">
    <div class="modal-window">
      <div class="modal-head">🔧 システム環境設定</div>
      <div class="modal-body">
        
        <!-- データセキュア動作モード -->
        <div class="setting-group">
          <span class="setting-label">データセキュア動作モード</span>
          <div style="font-size: 12.5px; color: var(--text-main); display: flex; align-items: center; gap: 6px; background: var(--bg-input); padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border-color); font-weight: 600;">
            🔒 ローカル保存モード稼働中
          </div>
        </div>

        <!-- レポート幅調整項目 -->
        <div class="setting-group">
          <span class="setting-label">レポート領域の高さ（通常時画面比）</span>
          <div class="preset-btn-group">
            <button type="button" class="preset-btn" onclick="applyPresetHeight(25)">25%</button>
            <button type="button" class="preset-btn" onclick="applyPresetHeight(35)">35%</button>
            <button type="button" class="preset-btn" onclick="applyPresetHeight(45)">45%</button>
          </div>
          <div style="display: flex; align-items: center; gap: 8px; margin-top: 4px;">
            <input type="number" id="reportHeightInput" class="cyber-input" min="0" max="100" placeholder="自由入力 0-100">
            <span style="font-size: 13px; font-weight: bold;">%</span>
          </div>
        </div>

        <div class="setting-group" style="display: none;">
          <input type="radio" name="chatAi" id="aiGemini" value="gemini" checked>
          <input type="radio" name="chatAi" id="aiClaude" value="claude">
          <input type="radio" name="chatAi" id="aiDeepSeek" value="deepseek">
          <input type="radio" name="chatAi" id="aiOpenAI" value="openai">
        </div>

        <div class="setting-group">
          <span class="setting-label">カラーテーマ</span>
          <div class="radio-pack" style="flex-direction: row; gap: 6px;">
            <div class="radio-row" style="flex: 1;">
              <input type="radio" name="appTheme" id="themeTech" value="tech" checked>
              <label for="themeTech" class="radio-label" style="text-align: center; padding: 10px 4px; font-size: 11px;">Modern 🏙️</label>
            </div>
            <div class="radio-row" style="flex: 1;">
              <input type="radio" name="appTheme" id="themeCyber" value="cyber">
              <label for="themeCyber" class="radio-label" style="text-align: center; padding: 10px 4px; font-size: 11px;">Cyber ⚡</label>
            </div>
            <div class="radio-row" style="flex: 1;">
              <input type="radio" name="appTheme" id="themeSoft" value="soft">
              <label for="themeSoft" class="radio-label" style="text-align: center; padding: 10px 4px; font-size: 11px;">Soft 🌸</label>
            </div>
          </div>
        </div>

        <div class="setting-group">
          <span class="setting-label">リアルタイム同期用 URL (GAS / Webhook)</span>
          <input type="url" id="syncUrl" class="cyber-input" placeholder="https://script.google.com/... などを入力">
        </div>

        <div class="setting-group">
          <span class="setting-label">Gemini API Key</span>
          <input type="password" id="apiKeyGemini" class="cyber-input" placeholder="AI-Keyを入力...">
        </div>
        <div class="setting-group">
          <span class="setting-label">Anthropic Claude API Key</span>
          <input type="password" id="apiKeyClaude" class="cyber-input" placeholder="sk-ant-を入力...">
        </div>
        <div class="setting-group">
          <span class="setting-label">DeepSeek API Key</span>
          <input type="password" id="apiKeyDeepSeek" class="cyber-input" placeholder="sk-を入力...">
        </div>
        <div class="setting-group">
          <span class="setting-label">OpenAI API Key</span>
          <input type="password" id="apiKeyOpenAI" class="cyber-input" placeholder="sk-proj-を入力...">
        </div>

        <div class="setting-group">
          <span class="setting-label">個人メモリ 🧠 (全セッション共有プロファイル)</span>
          <textarea id="personalMemory" class="cyber-input" style="height: 60px; resize: vertical; line-height: 1.45;"></textarea>
        </div>

        <div class="setting-group" style="margin-top: 4px; border-top: 1px solid var(--border-color); padding-top: 10px; gap: 6px;">
          <span class="setting-label">データバックアップマネジメント</span>
          <button type="button" class="btn-secondary" style="color:var(--accent-cyan); font-weight:600;" onclick="exportAllData()">📥 ローカルへJSONエクスポート</button>
          <label class="btn-secondary" style="color:var(--accent-purple); text-align:center; display:block; cursor:pointer; font-weight:600;">
            📤 バックアップJSONをインポート
            <input type="file" accept=".json" style="display:none;" onchange="importAllData(this)">
          </label>
        </div>

      </div>
      <div class="modal-foot">
        <button type="button" class="btn-secondary" onclick="closeSettings()">キャンセル</button>
        <button type="button" class="btn-primary" onclick="applyAndCloseSettings()">設定を適用</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'life_report_production_settings_v3';
    const PROJECTS_LIST_KEY = 'life_report_projects_meta_list';
    const CHAT_LOGS_KEY = 'life_report_chat_logs';
    const REPORT_DATA_KEY = 'life_report_panes_data_v3';

    let currentProjectId = '';
    let chatLogs = []; 

    const chatHistory = document.getElementById('chatHistory');
    const chatInput = document.getElementById('chatInput');
    let attachedFileData = null; 
    let attachedFileName = "";

    function getChatLogsKey() { return `${CHAT_LOGS_KEY}_${currentProjectId}`; }
    function getReportDataKey() { return `${REPORT_DATA_KEY}_${currentProjectId}`; }

    async function syncToCloudRealtime() {
      const syncUrlEl = document.getElementById('syncUrl');
      const syncUrl = syncUrlEl && syncUrlEl.value ? syncUrlEl.value.trim() : '';
      if (!syncUrl) return; 

      const payload = {
        projectId: currentProjectId,
        projectName: getLocalProjectsList().find(p => p.id === currentProjectId)?.name || 'Report',
        timestamp: new Date().toISOString(),
        report: {
          current: document.getElementById('pane-current')?.innerHTML || '',
          knowledge: document.getElementById('pane-knowledge')?.innerHTML || '',
          memory: document.getElementById('pane-memory')?.innerHTML || '',
          history: document.getElementById('pane-history')?.innerHTML || ''
        },
        chatLogs: chatLogs
      };

      try {
        fetch(syncUrl, {
          method: 'POST',
          mode: 'cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        }).catch(e => console.error("Cloud Sync Error:", e));
      } catch (err) { console.error(err); }
    }

    function getLocalProjectsList() {
      try { return JSON.parse(localStorage.getItem(PROJECTS_LIST_KEY) || '[]'); } catch(e) { return []; }
    }

    function saveLocalProjectsList(list) {
      localStorage.setItem(PROJECTS_LIST_KEY, JSON.stringify(list));
    }

    function createNewProject() {
      let projects = getLocalProjectsList();

      const id = 'proj_' + Date.now();
      const defaultName = `新規プロジェクト`;

      currentProjectId = id;
      projects.unshift({ id: id, name: defaultName });
      saveLocalProjectsList(projects);

      chatLogs = [];
      localStorage.removeItem(getChatLogsKey());

      const initialReport = {
        current: '<h4>決定事項</h4><ul><li>（対話の内容に応じてここに自動集約されます）</li></ul>',
        knowledge: '<h4>ナレッジ</h4><ul><li>（重要なルールや仕様がここに蓄集されます）</li></ul>',
        memory: '<h4>個別メモリ 🧠</h4><p>このプロジェクト固有の状況や背景情報をAIが記憶します。</p>',
        history: '<h4>履歴</h4><ul><li>プロジェクト作成</li></ul>'
      };
      localStorage.setItem(getReportDataKey(), JSON.stringify(initialReport));

      renderProjectsList();
      setActiveProjectUI(id, defaultName);
      applyReportData(initialReport);
      setDefaultInitialAIMessage();

      const reportTabSelect = document.getElementById('reportTabSelect');
      if (reportTabSelect) reportTabSelect.value = 'current';
      switchTab('current');

      saveChatLogs();
      saveReportData();
    }

    function triggerNewProject() {
      createNewProject();
      toggleBottomSheet();
    }

    function renderProjectsList() {
      const listEl = document.getElementById('projectList');
      if (!listEl) return;
      const projects = getLocalProjectsList();
      listEl.innerHTML = '';

      if (projects.length === 0) {
        listEl.innerHTML = '<li class="sheet-item" style="text-align:center; color:var(--accent-cyan); pointer-events:none;">セッション履歴がありません</li>';
        return;
      }

      projects.forEach(proj => {
        const li = document.createElement('li');
        li.className = `sheet-item ${proj.id === currentProjectId ? 'active' : ''}`;
        li.setAttribute('data-id', proj.id);
        
        const nameSpan = document.createElement('span');
        nameSpan.className = 'sheet-item-name';
        nameSpan.textContent = proj.name;
        nameSpan.onclick = () => selectProject(proj.id, proj.name);
        li.appendChild(nameSpan);

        const delBtn = document.createElement('span');
        delBtn.className = 'project-del-btn';
        delBtn.innerHTML = '🗑️';
        delBtn.onclick = (e) => {
          e.stopPropagation();
          deleteProject(proj.id, proj.name);
        };
        li.appendChild(delBtn);

        listEl.appendChild(li);
      });
    }

    function deleteProject(id, name) {
      if (!confirm(`プロジェクト「${name}」を削除しますか？`)) return;

      let projects = getLocalProjectsList();
      projects = projects.filter(p => p.id !== id);
      saveLocalProjectsList(projects);

      localStorage.removeItem(`${CHAT_LOGS_KEY}_${id}`);
      localStorage.removeItem(`${REPORT_DATA_KEY}_${id}`);

      if (currentProjectId === id) {
        if (projects.length > 0) {
          const nextProj = projects[0];
          currentProjectId = nextProj.id;
          setActiveProjectUI(nextProj.id, nextProj.name);

          const savedReports = localStorage.getItem(getReportDataKey());
          if (savedReports) { try { applyReportData(JSON.parse(savedReports)); } catch(e){} }

          const savedLogs = localStorage.getItem(getChatLogsKey());
          try { chatLogs = savedLogs ? JSON.parse(savedLogs) : []; } catch(e) { chatLogs = []; }
          
          if (chatHistory) {
            chatHistory.innerHTML = '';
            if (chatLogs.length > 0) {
              chatLogs.forEach(log => appendMessageToUI(log.sender, log.text, log.image));
            } else { setDefaultInitialAIMessage(); }
            chatHistory.scrollTop = chatHistory.scrollHeight;
          }
        } else { createNewProject(); }
      }
      renderProjectsList();
      syncToCloudRealtime();
    }

    function setActiveProjectUI(id, name) {
      document.querySelectorAll('#projectList .sheet-item').forEach(item => {
        if (item.getAttribute('data-id') === id) item.classList.add('active');
        else item.classList.remove('remove');
      });
      const hp = document.getElementById('headerProjectName');
      if (hp) hp.textContent = name;
    }

    function updateProjectName(id, newName) {
      let projects = getLocalProjectsList();
      const targetProj = projects.find(p => p.id === id);
      if (targetProj) {
        targetProj.name = newName;
        saveLocalProjectsList(projects);
        renderProjectsList();
        if (id === currentProjectId) {
          const hp = document.getElementById('headerProjectName');
          if (hp) hp.textContent = newName;
        }
      }
    }

    function toggleBottomSheet() {
      const sheet = document.getElementById('bottomSheet');
      const overlay = document.getElementById('sheetOverlay');
      if (sheet && overlay) {
        sheet.classList.toggle('open');
        overlay.classList.toggle('open');
      }
    }

    function openSettings() { 
      document.getElementById('settingsModal')?.classList.add('open'); 
    }
    function closeSettings() { document.getElementById('settingsModal')?.classList.remove('open'); }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('settingsModal')?.addEventListener('click', (e) => {
        if (e.target === e.currentTarget) closeSettings();
      });
    });

    function toggleReportHeight() {
      const reportSection = document.getElementById('reportSection');
      const expandBar = document.getElementById('expandBar');
      if (!reportSection || !expandBar) return;
      
      reportSection.classList.toggle('expanded');
      if (reportSection.classList.contains('expanded')) {
        reportSection.style.height = '75dvh';
        expandBar.textContent = '▲ 収納';
      } else {
        const savedUI = localStorage.getItem(STORAGE_KEY);
        let baseHeight = '25';
        if (savedUI) {
          try {
            const settings = JSON.parse(savedUI);
            if (settings.reportHeight) baseHeight = settings.reportHeight;
          } catch(e){}
        }
        reportSection.style.height = baseHeight + 'dvh';
        expandBar.textContent = '展開 ▼';
      }
    }

    function applyPresetHeight(val) {
      const input = document.getElementById('reportHeightInput');
      if (input) input.value = val;
    }

    function switchTab(tabName) {
      document.querySelectorAll('.report-pane').forEach(pane => pane.classList.remove('active'));
      document.getElementById(`pane-${tabName}`)?.classList.add('active');
    }

    function selectProject(id, name) {
      currentProjectId = id;
      setActiveProjectUI(id, name);

      const savedReports = localStorage.getItem(getReportDataKey());
      if (savedReports) { 
        try { applyReportData(JSON.parse(savedReports)); } catch(e){} 
      } else {
        applyReportData({
          current: '<h4>決定事項</h4><ul><li>（対話の内容に応じてここに自動集約されます）</li></ul>',
          knowledge: '<h4>ナレッジ</h4><ul><li>（重要なルールや仕様がここに蓄集されます）</li></ul>',
          memory: '<h4>個別メモリ 🧠</h4><p>このプロジェクト固有の状況や背景情報をAIが記憶します。</p>',
          history: '<h4>履歴</h4><ul><li>プロジェクト作成</li></ul>'
        });
      }

      const savedLogs = localStorage.getItem(getChatLogsKey());
      if (savedLogs) {
        try { chatLogs = JSON.parse(savedLogs); } catch(e) { chatLogs = []; }
        if (chatHistory) {
          chatHistory.innerHTML = '';
          chatLogs.forEach(log => appendMessageToUI(log.sender, log.text, log.image));
          chatHistory.scrollTop = chatHistory.scrollHeight;
        }
      } else {
        chatLogs = [];
        setDefaultInitialAIMessage();
      }

      const reportTabSelect = document.getElementById('reportTabSelect');
      if (reportTabSelect) reportTabSelect.value = 'current';
      switchTab('current');

      const sheet = document.getElementById('bottomSheet');
      const overlay = document.getElementById('sheetOverlay');
      if (sheet && overlay) {
        sheet.classList.remove('open');
        overlay.classList.remove('open');
      }
    }

    function applyReportData(data) {
      if (!data) return;
      if (data.current && document.getElementById('pane-current')) document.getElementById('pane-current').innerHTML = data.current;
      if (data.knowledge && document.getElementById('pane-knowledge')) document.getElementById('pane-knowledge').innerHTML = data.knowledge;
      if (data.memory && document.getElementById('pane-memory')) document.getElementById('pane-memory').innerHTML = data.memory;
      if (data.history && document.getElementById('pane-history')) document.getElementById('pane-history').innerHTML = data.history;
    }

    function appendMessageToUI(sender, text, imageSrc = null) {
      if (!chatHistory) return;
      const msg = document.createElement('div');
      msg.className = `msg ${sender}`;

      if (imageSrc) {
        const img = document.createElement('img');
        img.src = imageSrc;
        img.style.maxWidth = '100%';
        img.style.borderRadius = '8px';
        img.style.marginBottom = '6px';
        img.style.display = 'block';
        msg.appendChild(img);
      }

      const textNode = document.createElement('div');
      if (sender === 'ai' && typeof marked !== 'undefined') {
        textNode.innerHTML = marked.parse(text || '');
      } else {
        textNode.textContent = text || '';
      }
      msg.appendChild(textNode);

      chatHistory.appendChild(msg);
      chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    function setDefaultInitialAIMessage() {
      if (chatLogs.length === 0 && chatHistory) {
        chatHistory.innerHTML = '';
        const greetText = "### AI Copilot Ready\nどのような要件や思考プロセスを処理しますか？会話の内容に応じて、上の情報領域（Current/Knowledge/Memory/History）が自動的に構造化されていきます。画像添付にも対応しています。";
        appendMessageToUI('ai', greetText);
        chatLogs.push({ sender: 'ai', text: greetText, image: null });
        saveChatLogs();
      }
    }

    function handleFileSelect(input) {
      const file = input.files?.[0];
      if (!file) return;
      
      attachedFileName = file.name;
      const reader = new FileReader();
      reader.onload = function(e) {
        attachedFileData = e.target?.result;
        const container = document.getElementById('previewContainer');
        const pText = document.getElementById('previewText');
        if (container && pText) {
          pText.textContent = `📸 添付画像: ${attachedFileName}`;
          container.classList.add('active');
        }
      };
      reader.readAsDataURL(file);
    }

    function clearAttachment() {
      attachedFileData = null;
      attachedFileName = "";
      const container = document.getElementById('previewContainer');
      if (container) container.classList.remove('active');
      const fileInput = document.getElementById('fileInput');
      if (fileInput) fileInput.value = "";
    }

    function handleResizeInput() {
      chatInput.style.height = '36px';
      chatInput.style.height = Math.min(chatInput.scrollHeight, 140) + 'px';
    }

    if (chatInput) {
      chatInput.addEventListener('input', handleResizeInput);
      chatInput.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          e.preventDefault();
          sendMessage();
        }
      });
    }

    function loadInitialApplicationState() {
      let savedUI = localStorage.getItem(STORAGE_KEY);
      let theme = 'tech';
      let rHeight = '25';
      let chatAi = 'gemini';

      if (savedUI) {
        try {
          const settings = JSON.parse(savedUI);
          theme = settings.appTheme || 'tech';
          rHeight = settings.reportHeight || '25';
          chatAi = settings.chatAi || 'gemini';
          
          if (settings.syncUrl) document.getElementById('syncUrl').value = settings.syncUrl;
          if (settings.apiKeyGemini) document.getElementById('apiKeyGemini').value = settings.apiKeyGemini;
          if (settings.apiKeyClaude) document.getElementById('apiKeyClaude').value = settings.apiKeyClaude;
          if (settings.apiKeyDeepSeek) document.getElementById('apiKeyDeepSeek').value = settings.apiKeyDeepSeek;
          if (settings.apiKeyOpenAI) document.getElementById('apiKeyOpenAI').value = settings.apiKeyOpenAI;
          if (settings.personalMemory) document.getElementById('personalMemory').value = settings.personalMemory;
        } catch(e){}
      }

      const rb = document.getElementById(`theme${theme.charAt(0).toUpperCase() + theme.slice(1)}`);
      if (rb) rb.checked = true;
      document.body.className = `theme-${theme}`;

      const aiSelect = document.getElementById('aiModelSelect');
      if (aiSelect) aiSelect.value = chatAi;

      const inputRH = document.getElementById('reportHeightInput');
      if (inputRH) inputRH.value = rHeight;

      const reportSection = document.getElementById('reportSection');
      if (reportSection) reportSection.style.height = rHeight + 'dvh';

      let projects = getLocalProjectsList();
      if (projects.length > 0) {
        const topProj = projects[0];
        selectProject(topProj.id, topProj.name);
      } else {
        createNewProject();
      }
      renderProjectsList();
    }

    function applyAndCloseSettings() {
      const appTheme = document.querySelector('input[name="appTheme"]:checked')?.value || 'tech';
      const aiModelSelect = document.getElementById('aiModelSelect');
      const chatAi = aiModelSelect ? aiModelSelect.value : 'gemini';
      const syncUrl = document.getElementById('syncUrl')?.value.trim() || '';
      const apiKeyGemini = document.getElementById('apiKeyGemini')?.value.trim() || '';
      const apiKeyClaude = document.getElementById('apiKeyClaude')?.value.trim() || '';
      const apiKeyDeepSeek = document.getElementById('apiKeyDeepSeek')?.value.trim() || '';
      const apiKeyOpenAI = document.getElementById('apiKeyOpenAI')?.value.trim() || '';
      const personalMemory = document.getElementById('personalMemory')?.value || '';
      
      let reportHeight = document.getElementById('reportHeightInput')?.value.trim() || '25';
      if (isNaN(reportHeight) || reportHeight === '') reportHeight = '25';

      document.body.className = `theme-${appTheme}`;
      const reportSection = document.getElementById('reportSection');
      if (reportSection && !reportSection.classList.contains('expanded')) {
        reportSection.style.height = reportHeight + 'dvh';
      }

      const settings = { chatAi, apiKeyGemini, apiKeyClaude, apiKeyDeepSeek, apiKeyOpenAI, personalMemory, appTheme, syncUrl, reportHeight };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));

      closeSettings();
    }

    function saveChatLogs() { localStorage.setItem(getChatLogsKey(), JSON.stringify(chatLogs)); }
    function saveReportData() {
      const rData = {
        current: document.getElementById('pane-current')?.innerHTML || '',
        knowledge: document.getElementById('pane-knowledge')?.innerHTML || '',
        memory: document.getElementById('pane-memory')?.innerHTML || '',
        history: document.getElementById('pane-history')?.innerHTML || ''
      };
      localStorage.setItem(getReportDataKey(), JSON.stringify(rData));
    }

    document.getElementById('reportTabSelect')?.addEventListener('change', (e) => {
      switchTab(e.target.value);
    });
    document.getElementById('aiModelSelect')?.addEventListener('change', (e) => {
      const savedUI = localStorage.getItem(STORAGE_KEY) || '{}';
      try {
        const parsed = JSON.parse(savedUI);
        parsed.chatAi = e.target.value;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(parsed));
      } catch(err){}
    });

    async function sendMessage() {
      const text = chatInput.value.trim();
      if (!text && !attachedFileData) return;

      appendMessageToUI('user', text, attachedFileData);
      chatLogs.push({ sender: 'user', text: text, image: attachedFileData });
      saveChatLogs();

      chatInput.value = '';
      handleResizeInput();
      
      const fileImg = attachedFileData; 
      clearAttachment();

      const progressMsg = document.createElement('div');
      progressMsg.className = 'msg ai analyzing';
      progressMsg.innerHTML = '<div class="spinner"></div><span>AI考案プロセマネージャー思考中...</span>';
      chatHistory.appendChild(progressMsg);
      chatHistory.scrollTop = chatHistory.scrollHeight;

      try {
        const aiResponseText = await callRealAiApi(text, fileImg);
        progressMsg.remove();
        
        const cleanResponseText = processStructuredTags(aiResponseText);
        appendMessageToUI('ai', cleanResponseText);
        chatLogs.push({ sender: 'ai', text: cleanResponseText, image: null });
        
        saveChatLogs();
        saveReportData();
        syncToCloudRealtime();
      } catch (error) {
        console.error(error);
        progressMsg.remove();
        const errMsg = `⚠️ 通信エラー: ${error.message}\nAPIキーの設定、または接続環境を確認してください。(ブラウザからの直接アクセスによるCORS制限の可能性があります)`;
        appendMessageToUI('ai', errMsg);
        chatLogs.push({ sender: 'ai', text: errMsg, image: null });
        saveChatLogs();
      }
    }

    async function callRealAiApi(userText, base64Image) {
      const settingsStr = localStorage.getItem(STORAGE_KEY);
      if (!settingsStr) throw new Error("環境設定が未初期化です。ギアアイコンからAPIキーをセットしてください。");
      const settings = JSON.parse(settingsStr);

      const aiSelectEl = document.getElementById('aiModelSelect');
      const selectedAi = aiSelectEl ? aiSelectEl.value : (settings.chatAi || 'gemini');

      const currentContent = document.getElementById('pane-current')?.innerHTML || '';
      const knowledgeContent = document.getElementById('pane-knowledge')?.innerHTML || '';
      const memoryContent = document.getElementById('pane-memory')?.innerHTML || '';
      const historyContent = document.getElementById('pane-history')?.innerHTML || '';
      const globalProfile = settings.personalMemory || '';

      const systemInstructionText = `
あなたはユーザーの自律走行・考案プロセスを爆速化する多層ドキュメント集約型AIアシスタント「AI Copilot」です。
対話を行いながら、必要に応じて上部の情報パネル（4つのカテゴリ）を更新するための特殊タグを出力してください。

【重要：プロファイル記憶情報】
${globalProfile}

【現在の各情報パネルの状態】
<current_pane_state>${currentContent}</current_pane_state>
<knowledge_pane_state>${knowledgeContent}</knowledge_pane_state>
<memory_pane_state>${memoryContent}</memory_pane_state>
<history_pane_state>${historyContent}</history_pane_state>

【パネル更新機能用特殊仕様タグ】
もしユーザーとの対話によって確定事項、仕様、コンテキストのアップデートが発生した場合、回答文の末尾または途中に以下のタグを含めて情報を出力してください。あなたがタグを出力すると、システムが自動的に上部パネルのHTMLを書き換えます。
・<update_current>HTMLコンテンツ</update_current> -> 決定事項(Current)を完全上書き更新
・<update_knowledge>HTMLコンテンツ</update_knowledge> -> 構造化ナレッジ(Knowledge)を完全上書き更新
・<update_memory>HTMLコンテンツ</update_memory> -> 個別メモリ(Memory)を完全上書き更新
・<update_history>HTMLコンテンツ</update_history> -> 履歴ログ(History)を完全上書き更新
・<update_title>新しいプロジェクトタイトル</update_title> -> セッションの名前を自動変更

※ パネルに書き込むHTMLには見出しとして「<h4>タイトル</h4>」や「<ul><li>項目</li></ul>」といったタグを用いて美しく表現してください。
※ ユーザーへの直接の回答文はMarkdownで記述し、これらの特殊タグは必要時のみ出力してください。
`;

      let aiResponseText = '';
      const callingProjectId = currentProjectId;

      if (selectedAi === 'gemini') {
        const apiKey = document.getElementById('apiKeyGemini')?.value.trim() || settings.apiKeyGemini || '';
        if (!apiKey) throw new Error("Gemini APIキーが未設定です。");
        
        const contents = chatLogs.map(log => {
          const parts = [];
          if (log.text) parts.push({ text: log.text });
          if (log.image) {
            const commaIndex = log.image.indexOf(',');
            const mimeType = log.image.substring(5, log.image.indexOf(';'));
            const base64Data = log.image.substring(commaIndex + 1);
            parts.push({ inlineData: { mimeType: mimeType, data: base64Data } });
          }
          return { role: log.sender === 'user' ? 'user' : 'model', parts: parts.length > 0 ? parts : [{text:""}] };
        });

        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            contents: contents,
            systemInstruction: {
              parts: [{ text: systemInstructionText }]
            }
          })
        });
        const resData = await response.json();
        if (resData.error) throw new Error(resData.error.message);
        aiResponseText = resData.candidates[0].content.parts[0].text;

      } else if (selectedAi === 'claude') {
        const apiKey = document.getElementById('apiKeyClaude')?.value.trim() || settings.apiKeyClaude || '';
        if (!apiKey) throw new Error("Claude APIキーが未設定です。");
        const messages = chatLogs.map(log => ({ role: log.sender === 'user' ? 'user' : 'assistant', content: log.text || '' }));
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
          body: JSON.stringify({ model: 'claude-3-5-sonnet-20241022', system: systemInstructionText, messages: messages, max_tokens: 4000 })
        });
        const resData = await response.json();
        if (resData.error) throw new Error(resData.error.message);
        aiResponseText = resData.content[0].text;

      } else if (selectedAi === 'deepseek') {
        const apiKey = document.getElementById('apiKeyDeepSeek')?.value.trim() || settings.apiKeyDeepSeek || '';
        if (!apiKey) throw new Error("DeepSeek APIキーが未設定です。");
        const messages = [{ role: 'system', content: systemInstructionText }];
        chatLogs.forEach(log => { messages.push({ role: log.sender === 'user' ? 'user' : 'assistant', content: log.text || '' }); });
        const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
          body: JSON.stringify({ model: 'deepseek-chat', messages: messages, stream: false })
        });
        const resData = await response.json();
        if (resData.error) throw new Error(resData.error.message);
        aiResponseText = resData.choices[0].message.content;

      } else {
        const apiKey = document.getElementById('apiKeyOpenAI')?.value.trim() || settings.apiKeyOpenAI || '';
        if (!apiKey) throw new Error("OpenAI APIキーが未設定です。");
        const messages = [{ role: 'system', content: systemInstructionText }];
        chatLogs.forEach(log => { messages.push({ role: log.sender === 'user' ? 'user' : 'assistant', content: log.text || '' }); });
        const response = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
          body: JSON.stringify({ model: 'gpt-4o-mini', messages: messages })
        });
        const resData = await response.json();
        if (resData.error) throw new Error(resData.error.message);
        aiResponseText = resData.choices[0].message.content;
      }

      if (callingProjectId !== currentProjectId) {
        throw new Error("応答の待機中にセッションが切り替えられました。");
      }

      return aiResponseText;
    }

    function processStructuredTags(rawText) {
      let text = rawText;

      const currentMatch = text.match(/<update_current>([\s\S]*?)<\/update_current>/);
      const knowledgeMatch = text.match(/<update_knowledge>([\s\S]*?)<\/update_knowledge>/);
      const memoryMatch = text.match(/<update_memory>([\s\S]*?)<\/update_memory>/);
      const historyMatch = text.match(/<update_history>([\s\S]*?)<\/update_history>/);
      const titleMatch = text.match(/<update_title>([\s\S]*?)<\/update_title>/);

      if (currentMatch && document.getElementById('pane-current')) document.getElementById('pane-current').innerHTML = currentMatch[1].trim();
      if (knowledgeMatch && document.getElementById('pane-knowledge')) document.getElementById('pane-knowledge').innerHTML = knowledgeMatch[1].trim();
      if (memoryMatch && document.getElementById('pane-memory')) document.getElementById('pane-memory').innerHTML = memoryMatch[1].trim();
      if (historyMatch && document.getElementById('pane-history')) document.getElementById('pane-history').innerHTML = historyMatch[1].trim();
      
      if (titleMatch) {
        const newTitle = titleMatch[1].trim();
        updateProjectName(currentProjectId, newTitle);
      }

      text = text
        .replace(/<update_current>[\s\S]*?<\/update_current>/g, '')
        .replace(/<update_knowledge>[\s\S]*?<\/update_knowledge>/g, '')
        .replace(/<update_memory>[\s\S]*?<\/update_memory>/g, '')
        .replace(/<update_history>[\s\S]*?<\/update_history>/g, '')
        .replace(/<update_title>[\s\S]*?<\/update_title>/g, '');

      return text.trim();
    }

    function exportAllData() {
      const backup = {
        metaList: getLocalProjectsList(),
        settings: JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'),
        stores: {}
      };
      backup.metaList.forEach(p => {
        backup.stores[`chat_${p.id}`] = localStorage.getItem(`${CHAT_LOGS_KEY}_${p.id}`) || '[]';
        backup.stores[`report_${p.id}`] = localStorage.getItem(`${REPORT_DATA_KEY}_${p.id}`) || '{}';
      });

      const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `life_report_full_backup_${Date.now()}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function importAllData(fileInput) {
      const file = fileInput.files?.[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const backup = JSON.parse(e.target?.result);
          if (!backup.metaList || !backup.stores) { alert("無効なバックアップファイルフォーマットです。"); return; }
          
          if (!confirm("既存のすべてのローカルストレージデータが上書きされます。よろしいですか？")) return;

          localStorage.setItem(PROJECTS_LIST_KEY, JSON.stringify(backup.metaList));
          localStorage.setItem(STORAGE_KEY, JSON.stringify(backup.settings || {}));

          Object.keys(backup.stores).forEach(key => {
            if (key.startsWith('chat_')) {
              const pid = key.replace('chat_', '');
              localStorage.setItem(`${CHAT_LOGS_KEY}_${pid}`, backup.stores[key]);
            } else if (key.startsWith('report_')) {
              const pid = key.replace('report_', '');
              localStorage.setItem(`${REPORT_DATA_KEY}_${pid}`, backup.stores[key]);
            }
          });

          alert("インポートが完了しました。アプリケーションをリロードします。");
          window.location.reload();
        } catch(err) { alert("パースエラー: 有効なJSONファイルではありません。"); }
      };
      reader.readAsText(file);
    }

    window.onload = loadInitialApplicationState;
  </script>
