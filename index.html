<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aireports</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- ヘッダーエリア -->
    <header class="app-header">
        <h1 class="logo">Aireports</h1>
        <div class="header-actions">
            <button id="export-btn" class="icon-btn" title="外部へエクスポート">📤</button>
            <button id="settings-btn" class="icon-btn" title="設定">⚙️</button>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="app-container">
        <!-- 4層レポートセクション -->
        <section class="report-section">
            <div class="report-card" id="card-current">
                <div class="card-header">
                    <h3>Current</h3>
                    <span class="pulse-dot"></span>
                </div>
                <div id="current-report" class="report-content" contenteditable="true" placeholder="現在の状況やタスクがここに同期されます..."></div>
            </div>
            
            <div class="report-card" id="card-knowledge">
                <div class="card-header">
                    <h3>Knowledge</h3>
                </div>
                <div id="knowledge-report" class="report-content" contenteditable="true" placeholder="蓄積された知識・ルール・マニュアル..."></div>
            </div>
            
            <div class="report-card" id="card-memory">
                <div class="card-header">
                    <h3>Memory</h3>
                </div>
                <div id="memory-report" class="report-content" contenteditable="true" placeholder="長期的な文脈やユーザーの好み・キャラクター設定..."></div>
            </div>
            
            <div class="report-card" id="card-history">
                <div class="card-header">
                    <h3>History</h3>
                </div>
                <div id="history-report" class="report-content" contenteditable="true" placeholder="過去の更新履歴やアーカイブのサマリー..."></div>
            </div>
        </section>
        
        <!-- チャットセクション -->
        <section class="chat-section">
            <div class="chat-display" id="chat-display">
                <div class="message system-msg">
                    <span class="msg-content">対話型バックアップ同期システムが起動しました。</span>
                </div>
            </div>
            <div class="chat-input-container">
                <textarea id="chat-input" placeholder="AIへメッセージを送信..." rows="1"></textarea>
                <button id="send-btn" class="send-btn">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></svg>
                </button>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
