<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luxury Minimal UI</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts (洗練された印象を与えるフォントの導入) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  
  <style>
    /* フォントファミリーの定義 */
    .font-luxury {
      font-family: 'Cormorant Garamond', 'Noto Sans JP', sans-serif;
    }
    
    /* ボタンの内側を走る光沢（シマー）エフェクトのアニメーション */
    @keyframes shimmer {
      100% { transform: translateX(100%); }
    }
    .animate-shimmer {
      animation: shimmer 2s infinite;
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-[#fbfaf8] via-[#f5f2eb] to-[#e8e4da] flex items-center justify-center p-4 font-luxury antialiased selection:bg-[#d4af37]/20">

  <!-- メインカード: グラスモルフィズム（すりガラス）と極薄の多層シャドウ -->
  <div class="w-full max-w-md backdrop-blur-xl bg-white/50 rounded-2xl border border-white/80 shadow-[0_4px_30px_rgba(0,0,0,0.01),0_1px_3px_rgba(0,0,0,0.01),inset_0_1px_0_rgba(255,255,255,0.6)] p-6 transition-all duration-500 hover:shadow-[0_20px_50px_rgba(142,132,112,0.06)]">
    
    <!-- ヘッダーエリア: ハイエンドコスメのような繊細なタイポグラフィ -->
    <div class="mb-6 text-center">
      <h2 class="text-[10px] font-light tracking-[0.3em] text-[#a39883] uppercase">AI Intelligence Suite</h2>
      <p class="text-xl font-light text-[#3a352a] mt-1 tracking-wide">システム設定</p>
      <div class="w-8 h-[1px] bg-[#d2bfa9] mx-auto mt-3 opacity-60"></div>
    </div>

    <!-- コントロールエリア: AIモデルセレクトとcurrentボタンの横並び -->
    <div class="flex items-center gap-3">
      
      <!-- AIモデル セレクトボックスコンテナ -->
      <div class="relative flex-1 group">
        <label class="absolute -top-2 left-3 bg-gradient-to-b from-[#fbfaf8] via-white to-white px-1.5 text-[9px] font-medium tracking-[0.15em] text-[#a39883] transition-colors duration-300 group-focus-within:text-[#c5a059]">
          Aiモデル
        </label>
        <select class="w-full appearance-none bg-white/30 border border-[#e2ded5] rounded-xl px-4 h-[46px] text-xs text-[#4a4438] tracking-wide outline-none transition-all duration-300 cursor-pointer focus:border-[#c5a059] focus:bg-white/80 focus:ring-4 focus:ring-[#c5a059]/5">
          <option value="claude-3-5">Claude 3.5 Sonnet</option>
          <option value="gemini-1-5">Gemini 1.5 Pro</option>
          <option value="gpt-4o">GPT-4o Premium</option>
        </select>
        <!-- カスタム矢印アイコン（極細ライン） -->
        <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-[#a39883] group-hover:text-[#4a4438] transition-colors duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.2" stroke="currentColor" class="w-3.5 h-3.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
          </svg>
        </div>
      </div>

      <!-- Currentボタン: 絹のような微細な光沢をもつシャンパンゴールド -->
      <button class="relative overflow-hidden group h-[46px] px-5 rounded-xl bg-gradient-to-r from-[#ecdcc9] via-[#dfcdb9] to-[#d2bfa9] text-[#5c4f3c] text-[11px] font-medium tracking-[0.2em] uppercase shadow-[0_4px_15px_rgba(210,191,169,0.15),inset_0_1px_0_rgba(255,255,255,0.4)] transition-all duration-500 ease-out hover:from-[#e3d1be] hover:to-[#c5b199] hover:shadow-[0_8px_25px_rgba(210,191,169,0.3)] active:scale-[0.98]">
        <!-- ホバー時に走る上品な光のライン -->
        <span class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/25 to-transparent -translate-x-full group-hover:animate-shimmer"></span>
        
        <!-- ボタン内要素（パルスインジケーター ＋ テキスト） -->
        <span class="relative flex items-center gap-2">
          <span class="relative flex h-1.5 w-1.5">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"></span>
            <span class="relative inline-flex rounded-full h-1.5 w-1.5 bg-white"></span>
          </span>
          Current
        </span>
      </button>

    </div>

    <!-- フッター装飾（ラグジュアリー感を高める控えめなテキスト） -->
    <div class="mt-6 text-center">
      <p class="text-[9px] text-[#b5ac9a] tracking-[0.1em] font-light">Optimized securely for elegant operations</p>
    </div>

  </div>

</body>
</html>
