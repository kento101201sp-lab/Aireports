<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LifeReport Production</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- ヘッダー領域 -->
        <header class="app-header">
            <button class="icon-btn" onclick="toggleBottomSheet()">📂</button>
            <h1 id="headerTitle">新規プロジェクト</h1>
            <button class="icon-btn" onclick="openSettings()">⚙️</button>
        </header>

        <!-- 4層レポートセクション -->
        <section id="reportSection" class="report-section">
            <div class="report-toolbar">
                <select id="reportTabSelect" class="tab-select">
                    <option value="current">Current (概要/決定事項)</option>
                    <option value="knowledge">Knowledge (仕様/ルール)</option>
                    <option value="memory">Memory (プロジェクト固有記憶)</option>
                    <option value="history">History (進捗履歴)</option>
                </select>
            </div>
            <div class="report-panes">
                <div id="pane-current" class="report-pane active"></div>
                <div id="pane-knowledge" class="report-pane"></div>
                <div id="pane-memory" class="report-pane"></div>
                <div id="pane-history" class="report-pane"></div>
            </div>
        </section>
        
        <!-- 領域伸縮バー -->
        <div id="expandBar" class="expand-bar" onclick="toggleReportHeight()">▼ レポート領域を展開 ▼</div>

        <!-- チャットログタイムライン -->
        <div id="chatHistory" class="chat-timeline"></div>

        <!-- 6. 送信フォーム・インプットデッキ (画面最下部常駐) -->
        <footer id="inputDeck" class="input-deck">
            <div id="previewContainer" class="preview-area">
                <span id="previewText"></span>
                <button class="clear-attr-btn" onclick="clearAttachment()">×</button>
            </div>
            <div class="input-row">
                <label class="attach-btn">
                    📸
                    <input type="file" accept="image/*" style="display:none;" onchange="handleFileSelect(this)">
                </label>
                <textarea id="chatInput" placeholder="メッセージを入力... (Ctrl+Enterで送信)"></textarea>
                <button class="send-btn" onclick="sendMessage()">送信</button>
            </div>
        </footer>
    </div>

    <!-- プロジェクト管理 ボトムシート -->
    <div id="sheetOverlay" class="sheet-overlay" onclick="toggleBottomSheet()"></div>
    <div id="bottomSheet" class="bottom-sheet">
        <div class="sheet-header">
            <h3>セッション履歴</h3>
            <button class="new-proj-btn" onclick="triggerNewProject()">➕ 新規作成</button>
        </div>
        <ul id="projectList" class="project-list"></ul>
    </div>

    <!-- システム設定 モーダル -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h2>⚙️ システム設定</h2>
            <hr>
            <div class="setting-item">
                <label>本番AIモデルの選択</label>
                <select id="aiModelSelect">
                    <option value="gemini">Gemini 2.5 Flash (推奨)</option>
                    <option value="claude">Claude 3.5 Sonnet</option>
                    <option value="deepseek">DeepSeek Chat</option>
                    <option value="openai">GPT-4o mini</option>
                </select>
                <div style="display:none;">
                    <input type="radio" name="chatAi" value="gemini" checked>
                    <input type="radio" name="chatAi" value="claude">
                    <input type="radio" name="chatAi" value="deepseek">
                    <input type="radio" name="chatAi" value="openai">
                </div>
            </div>
            
            <div class="setting-item">
                <label>デフォルトレポート領域の高さ</label>
                <div class="radio-group">
                    <label><input type="radio" name="repSize" value="20"> 20%</label>
                    <label><input type="radio" name="repSize" value="25" checked> 25%</label>
                    <label><input type="radio" name="repSize" value="35"> 35%</label>
                    <label><input type="radio" name="repSize" value="50"> 50%</label>
                </div>
            </div>

            <div class="setting-item">
                <label>APIキー設定</label>
                <input type="password" id="apiKeyGemini" placeholder="Gemini API Key">
                <input type="password" id="apiKeyClaude" placeholder="Claude API Key">
                <input type="password" id="apiKeyDeepSeek" placeholder="DeepSeek API Key">
                <input type="password" id="apiKeyOpenAI" placeholder="OpenAI API Key">
            </div>

            <div class="setting-item">
                <label>共通の個人メモリ（AIのベース背景知識）</label>
                <textarea id="personalMemory" placeholder="ユーザーの職種、好み、絶対に守ってほしいルールなど"></textarea>
            </div>

            <div class="setting-item">
                <label>システムテーマ</label>
                <div class="radio-group">
                    <label><input type="radio" name="appTheme" value="dark" checked> Cyber Dark</label>
                    <label><input type="radio" name="appTheme" value="light"> Cyber Light</label>
                </div>
            </div>

            <div class="setting-item">
                <label>リアルタイム外部同期 Webhook/GAS URL</label>
                <input type="url" id="syncUrl" placeholder="https://script.google.com/macros/s/... /cors-post">
            </div>

            <div class="setting-actions">
                <button class="btn-secondary" onclick="exportAllData()">📤 全データ書出</button>
                <label class="btn-secondary">
                    📥 データ復元
                    <input type="file" accept=".json" style="display:none;" onchange="importAllData(this)">
                </label>
                <button class="btn-primary" onclick="applyAndCloseSettings()">適用して閉じる</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
