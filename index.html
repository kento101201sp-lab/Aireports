<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="stylesheet" href="style.css">
    <title>Aireports</title>
</head>
<body>
    <div class="app-container">
        <header id="headerTitle">Aireports</header>
        <div id="chatHistory" class="chat-timeline"></div>
        
        <footer class="input-deck">
            <div id="previewContainer" class="preview-area">
                <span id="previewText"></span>
                <button onclick="clearAttachment()">×</button>
            </div>
            <div class="input-row">
                <textarea id="chatInput" placeholder="メッセージを入力..."></textarea>
                <button onclick="sendMessage()">送信</button>
            </div>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
